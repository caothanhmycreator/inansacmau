<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Lương - Sắc Màu</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/config.js"></script>
  <script src="js/auth_guard.js"></script>
  <script src="js/sidebar_loader.js"></script> 
  <style>
    /* ========================================================
       1. GIAO DIỆN CHUNG & PC (GIỮ NGUYÊN 100%)
       ======================================================== */
    :root { --primary: #2D5A27; --bg: #f4f7f6; --border: #e2e8f0; }
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; }
    #sidebar-frame { width: 250px; height: 100vh; position: fixed; left: 0; top: 0; border: none; z-index: 999; transition: 0.3s; }
    .main-content { flex: 1; margin-left: 250px; padding: 30px; transition: 0.3s; min-width: 0; }
    
    .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 15px; margin-bottom: 25px; }
    .header h2 { margin: 0; color: var(--primary); }
    .header-controls { display: flex; gap: 15px; align-items: center; }
    
    .month-picker { padding: 10px 15px; border-radius: 8px; border: 1px solid #cbd5e1; font-weight: bold; outline: none; }
    .btn-export { background: linear-gradient(135deg, #10b981, #059669); color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3); font-size: 14px; transition: 0.2s; }

    .summary-box { background: white; padding: 20px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #f39c12; display: inline-block; }
    .summary-box p { margin: 0; color: #666; font-size: 13px; font-weight: bold; }
    .summary-box h3 { margin: 5px 0 0 0; color: #d35400; font-size: 24px; }
    
    .payroll-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .staff-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid var(--border); position: relative; }
    
    .staff-name { font-size: 18px; font-weight: bold; color: var(--primary); margin: 0 0 5px 0; padding-bottom: 10px; border-bottom: 1px dashed #ccc; display: flex; justify-content: space-between; align-items: center;}
    .salary-row { display: flex; justify-content: space-between; margin: 10px 0; font-size: 14px; color: #333;}
    .salary-row.total { font-size: 18px; font-weight: bold; color: #c0392b; border-top: 2px solid #eee; padding-top: 15px; margin-top: 15px; }
    
    .val-plus { color: #27ae60; font-weight: bold; }
    .val-minus { color: #e74c3c; font-weight: bold; }
    
    .action-group { display: flex; gap: 6px; margin-top: 20px; flex-wrap: wrap; }
    .btn { flex: 1; padding: 12px 4px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 11px; display: flex; align-items: center; justify-content: center; gap: 3px; color: white; }
    .btn-finance { background: #3498db; }
    .btn-details { background: #f39c12; }
    .btn-absent { background: #64748b; }
    .btn-payslip { background: #8e44ad; }

    .badge { font-size: 11px; background: #e2e8f0; color: #475569; padding: 4px 10px; border-radius: 12px; font-weight: normal; }
    .badge-tuan { background: #fef08a; color: #9a3412; border: 1px solid #fde047; }
    .swal2-container { z-index: 20000 !important; }

    /* ========================================================
       2. MOBILE RESPONSIVE (ĐIỆN THOẠI)
       ======================================================== */
    @media (max-width: 768px) {
        #sidebar-frame { left: -250px; }
        .main-content { margin-left: 0 !important; padding: 15px; padding-top: 70px; }
        body.sidebar-open #sidebar-frame { left: 0; }
        .mobile-nav-btn { display: block; position: fixed; top: 10px; left: 10px; z-index: 1000; background: var(--primary); color: white; padding: 8px 12px; border: none; border-radius: 4px; }

        .header { flex-direction: column; align-items: flex-start; gap: 15px; }
        .header-controls { width: 100%; flex-direction: column; align-items: stretch; }
        .summary-box { width: 100%; box-sizing: border-box; text-align: center; }

        .payroll-grid { grid-template-columns: 1fr; }
        .action-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        /* FIX LỖI XUỐNG DÒNG TRONG POPUP CHI TIẾT (ẢNH image_7f9466) */
        .swal2-popup { width: 95% !important; padding: 10px !important; border-radius: 12px !important; }
        .swal2-html-container { margin: 10px 0 !important; overflow-x: auto !important; }
        
        .finance-table { width: 100% !important; border-collapse: collapse !important; table-layout: fixed !important; }
        .finance-table td { padding: 8px 4px !important; font-size: 12px !important; border-bottom: 1px solid #eee !important; word-break: break-word !important; }
        
        /* Cột Ngày và Số tiền bắt buộc không được xuống dòng */
        .col-date { width: 75px !important; white-space: nowrap !important; color: #666; }
        .col-amount { width: 85px !important; white-space: nowrap !important; font-weight: bold !important; text-align: right !important; color: #2c3e50; }
        .col-action { width: 45px !important; text-align: right !important; }
    }

    @media (min-width: 769px) { .mobile-nav-btn { display: none; } }
    
    /* SỬA LỖI IN TRÊN CHROME / ONLINE */
    @media print { 
      @page { margin: 15mm; }
      body { background: white !important; display: block !important; } 
      #sidebar-frame, .action-group, .no-print, .mobile-nav-btn { display: none !important; } 
      .main-content { margin: 0 !important; padding: 0 !important; width: 100% !important; display: block !important; } 
      .summary-box { width: 100% !important; box-sizing: border-box !important; }
      .payroll-grid { display: block !important; } /* Xếp dọc các thẻ trên giấy A4 */
      .staff-card { break-inside: avoid; page-break-inside: avoid; border: 1px solid #ddd !important; margin-bottom: 20px !important; box-shadow: none !important; width: 100% !important; box-sizing: border-box !important; } 
    }
  </style>
</head>
<body>

  <div class="main-content">
    <div class="header">
      <div><h2>💰 QUẢN LÝ LƯƠNG</h2><p style="margin: 5px 0 0 0; color: #666; font-size: 14px;">In Ấn Sắc Màu - Đồng Tháp</p></div>
      <div class="header-controls">
        <input type="month" id="month-selector" class="month-picker no-print" onchange="loadPayroll()">
        <button class="btn-export no-print" onclick="window.print()">🖨️ TẢI BẢNG LƯƠNG</button>
      </div>
    </div>
    <div class="summary-box"><p>TỔNG DOANH THU TRONG THÁNG</p><h3 id="lbl-doanh-thu">0đ</h3></div>
    <div id="payroll-container" class="payroll-grid"><h3 style="color:#888;">Đang tính toán sổ sách...</h3></div>
  </div>

  <script>
    let currentUser = JSON.parse(localStorage.getItem('currentUser'));
    let totalRevenue = 0;
    let totalRevenueWeek = 0; 
    let currentTcData = []; 
    let currentTcWeekData = []; 
    let globalAbsentData = {}; 
    const h = { 'apikey': window.SB_CONFIG.KEY, 'Authorization': `Bearer ${window.SB_CONFIG.KEY}`, 'Content-Type': 'application/json' };

    document.addEventListener("DOMContentLoaded", () => {
      if(!currentUser) return window.location.href = 'login.html';
      const now = new Date();
      document.getElementById('month-selector').value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
      loadPayroll();
    });

    // Hàm hỗ trợ: Lấy ngày Thứ Hai của tuần chứa một ngày bất kỳ
    function getMonday(d) {
        d = new Date(d);
        var day = d.getDay(), diff = d.getDate() - day + (day == 0 ? -6:1); // Chủ nhật (0) thì lùi 6 ngày
        return new Date(d.setDate(diff));
    }

    async function loadPayroll() {
      const monthVal = document.getElementById('month-selector').value; 
      const [year, month] = monthVal.split('-');
      const firstDay = `${year}-${month}-01`;
      const lastDay = new Date(year, month, 0).toISOString().split('T')[0];

      // Tính ngày Thứ Hai của tuần hiện tại 
      const today = new Date();
      let refDate = new Date(year, month - 1, new Date(year, month, 0).getDate());
      if(today.getFullYear() == year && today.getMonth() + 1 == month) {
          refDate = today;
      }
      
      const monday = getMonday(refDate);
      const strMonday = `${monday.getFullYear()}-${String(monday.getMonth()+1).padStart(2,'0')}-${String(monday.getDate()).padStart(2,'0')}`;
      const strSunday = new Date(year, month, 0).toISOString().split('T')[0];

      try {
        // Tải doanh thu
        const resRev = await fetch(`${window.SB_CONFIG.URL}/rest/v1/NhatKy_BanHang?select=Ngay_Gio,Tong_Don`, { headers: h });
        const revData = await resRev.json();
        
        totalRevenue = 0;
        totalRevenueWeek = 0;

        revData.forEach((item) => {
          const tDon = Number(item.Tong_Don) || 0;
          if (item.Ngay_Gio && (item.Ngay_Gio.includes(`${month}/${year}`) || item.Ngay_Gio.includes(`${year}-${month}`))) {
              totalRevenue += tDon;
          }
          
          if(item.Ngay_Gio) {
              const nDateStr = item.Ngay_Gio.split(' ')[0]; 
              let dt;
              if(nDateStr.includes('/')) {
                  const parts = nDateStr.split('/');
                  dt = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`);
              } else {
                  dt = new Date(nDateStr);
              }
              
              if(dt >= monday && dt <= refDate) {
                  totalRevenueWeek += tDon;
              }
          }
        });

        document.getElementById('lbl-doanh-thu').innerText = totalRevenue.toLocaleString('vi-VN') + 'đ';

        const resEmp = await fetch(`${window.SB_CONFIG.URL}/rest/v1/DM_NhanVien?select=*`, { headers: h });
        const empData = await resEmp.json();
        
        const resCC = await fetch(`${window.SB_CONFIG.URL}/rest/v1/NhatKy_ChamCong?Ngay=gte.${firstDay}&Ngay=lte.${lastDay}&select=*`, { headers: h });
        const ccData = await resCC.json();
        
        const resCCWeek = await fetch(`${window.SB_CONFIG.URL}/rest/v1/NhatKy_ChamCong?Ngay=gte.${strMonday}&Ngay=lte.${strSunday}&select=*`, { headers: h });
        const ccWeekData = await resCCWeek.json();

        const resTC = await fetch(`${window.SB_CONFIG.URL}/rest/v1/BienDong_TaiChinh?Ngay_Ghi=gte.${firstDay}&Ngay_Ghi=lte.${lastDay} 23:59:59&select=*`, { headers: h });
        currentTcData = await resTC.json(); 
        
        const resTCWeek = await fetch(`${window.SB_CONFIG.URL}/rest/v1/BienDong_TaiChinh?Ngay_Ghi=gte.${strMonday}&Ngay_Ghi=lte.${strSunday} 23:59:59&select=*`, { headers: h });
        currentTcWeekData = await resTCWeek.json();

        renderPayrollGrid(empData, ccData, ccWeekData, currentTcData, currentTcWeekData, year, month, monday);
      } catch (e) { Swal.fire('Lỗi', e.message, 'error'); }
    }

    function renderPayrollGrid(empData, ccData, ccWeekData, tcData, tcWeekData, year, month, monday) {
      const container = document.getElementById('payroll-container');
      container.innerHTML = "";
      globalAbsentData = {};
      const filteredEmp = empData.filter(emp => emp.Vai_Tro !== "Admin");
      const todayDate = new Date();
      todayDate.setHours(23, 59, 59, 999);

      filteredEmp.forEach(emp => {
        // CÁCH TÍNH CỦA TRỌNG ĐÃ ĐƯỢC CHUYỂN SANG GIỐNG THƯ
        const isMonthBasis = emp.Ho_Ten.includes("Nhung") || emp.Ho_Ten.includes("Thư") || emp.Ho_Ten.includes("Trọng");
        
        const workingCCData = isMonthBasis ? ccData : ccWeekData;
        const workingTCData = isMonthBasis ? tcData : tcWeekData;
        const workingRevenue = isMonthBasis ? totalRevenue : totalRevenueWeek;

        const myCC = workingCCData.filter(c => String(c.User_ID) === String(emp.id));
        const myTC = workingTCData.filter(t => String(t.User_ID) === String(emp.id));

        let luongCoBan = 0, phuCapViec = 0, tamUng = 0, hoaHong = 0, tongNhan = 0;
        let infoCong = "";
        let absents = [];

        if (isMonthBasis) {
            const daysInMonth = new Date(year, month, 0).getDate();
            for (let d = 1; d <= daysInMonth; d++) {
              const checkDate = new Date(year, month - 1, d);
              if (checkDate > todayDate) continue; 
              if (checkDate.getDay() === 0) continue; 

              const dateStr = `${year}-${month}-${String(d).padStart(2, '0')}`;
              const logsDay = myCC.filter(c => c.Ngay === dateStr);
              const hasMorning = logsDay.some(l => parseInt(l.Gio_Vao.split(':')[0]) < 12);
              const hasAfternoon = logsDay.some(l => parseInt(l.Gio_Vao.split(':')[0]) >= 12);

              if (!hasMorning) absents.push(`Ngày ${d} (Sáng)`);
              if (!hasAfternoon) absents.push(`Ngày ${d} (Chiều)`);
            }
        } else {
            for(let i=0; i<7; i++) {
                let checkDate = new Date(monday);
                checkDate.setDate(monday.getDate() + i);
                
                if(checkDate > todayDate) continue;
                if(checkDate.getDay() === 0) continue; 
                
                const d = checkDate.getDate();
                const m = checkDate.getMonth() + 1;
                const y = checkDate.getFullYear();
                const dateStr = `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                
                const logsDay = myCC.filter(c => c.Ngay === dateStr);
                const hasMorning = logsDay.some(l => parseInt(l.Gio_Vao.split(':')[0]) < 12);
                const hasAfternoon = logsDay.some(l => parseInt(l.Gio_Vao.split(':')[0]) >= 12);

                if (!hasMorning) absents.push(`${d}/${m} (Sáng)`);
                if (!hasAfternoon) absents.push(`${d}/${m} (Chiều)`);
            }
        }
        
        globalAbsentData[emp.id] = absents;

        if (isMonthBasis) {
          const soNgay = myCC.length * 0.5;
          luongCoBan = (emp.Luong_Co_Ban / 26) * soNgay;
          infoCong = `${soNgay} ngày`;
        } else {
          let soBuoi = myCC.length;
          luongCoBan = emp.Luong_Co_Ban * soBuoi;
          infoCong = `${soBuoi} buổi`;
        }

        let phanTramHH = 0;
        let bacDoanhThu = Math.floor(workingRevenue / 100000000);
        if (bacDoanhThu >= 1) phanTramHH = 1 + (bacDoanhThu - 1) * 0.5;
        if (emp.Huong_Hoa_Hong && phanTramHH > 0) hoaHong = workingRevenue * (phanTramHH / 100);

        myTC.forEach(tc => { if (tc.Loai === "Tạm ứng") tamUng += tc.So_Tien; else phuCapViec += tc.So_Tien; });
        tongNhan = luongCoBan + hoaHong + phuCapViec - tamUng;

        const titleBage = isMonthBasis ? '<span class="badge">Kết theo Tháng</span>' : '<span class="badge badge-tuan">Kết theo Tuần</span>';

        container.innerHTML += `
          <div class="staff-card">
            <h3 class="staff-name">${emp.Ho_Ten} ${titleBage}</h3>
            <div class="salary-row"><span>Công thực tế:</span> <b>${infoCong}</b></div>
            <div class="salary-row"><span>Lương cứng:</span> <b>${Math.round(luongCoBan).toLocaleString('vi-VN')}đ</b></div>
            ${(emp.Huong_Hoa_Hong && phanTramHH > 0) ? `<div class="salary-row"><span>Hoa hồng (${phanTramHH}%):</span> <b class="val-plus">+ ${Math.round(hoaHong).toLocaleString('vi-VN')}đ</b></div>` : ''}
            <div class="salary-row"><span>Phụ cấp việc:</span> <b class="val-plus">+ ${phuCapViec.toLocaleString('vi-VN')}đ</b></div>
            <div class="salary-row"><span>Trừ tạm ứng:</span> <b class="val-minus">- ${tamUng.toLocaleString('vi-VN')}đ</b></div>
            <div class="salary-row total"><span>THỰC NHẬN:</span> <span>${Math.round(tongNhan).toLocaleString('vi-VN')}đ</span></div>
            
            <div class="action-group no-print">
              <button class="btn btn-finance" onclick="openFinanceModal('${emp.id}', '${emp.Ho_Ten}', ${isMonthBasis})">💰 Nhập</button>
              <button class="btn btn-details" onclick="viewFinanceDetails('${emp.id}', '${emp.Ho_Ten}', ${isMonthBasis})">👀 Kê khai</button>
              <button class="btn btn-absent" onclick="showAbsentDetails('${emp.id}', '${emp.Ho_Ten}')">🚫 Nghỉ</button>
              <button class="btn btn-payslip" onclick="showPayslip('${emp.id}', '${emp.Ho_Ten}', '${infoCong}', ${luongCoBan}, ${hoaHong}, ${phanTramHH}, ${phuCapViec}, ${tamUng}, ${tongNhan}, ${isMonthBasis})">📄 Phiếu</button>
            </div>
          </div>`;
      });
    }

    function showAbsentDetails(empId, name) {
        const absents = globalAbsentData[empId] || [];
        Swal.fire({
            title: `Chi tiết nghỉ - ${name}`,
            html: absents.length > 0 ? `<div style="text-align:left; color:#c53030; font-size:14px; line-height:1.6;">${absents.join('<br>')}</div>` : "Nhân viên đi làm đầy đủ, không nghỉ buổi nào (tính đến hiện tại).",
            confirmButtonText: 'ĐÓNG', confirmButtonColor: '#64748b'
        });
    }

    function showPayslip(empId, name, cong, luong, hh, hhPct, pc, ung, tong, isMonthBasis) {
        const monthVal = document.getElementById('month-selector').value;
        const [year, month] = monthVal.split('-');
        const tcSource = isMonthBasis ? currentTcData : currentTcWeekData;
        const myTC = tcSource.filter(t => String(t.User_ID) === String(empId));
        const absents = globalAbsentData[empId] || [];
        
        let absentHtml = absents.length > 0 ? `
            <div style="margin-top:10px; padding:10px; background:#fff5f5; border-radius:8px; border:1px solid #fed7d7;">
                <p style="font-weight:bold; color:#c53030; font-size:12px; margin-bottom:5px; text-align:left;">CÁC BUỔI NGHỈ:</p>
                <div style="font-size:11px; color:#c53030; text-align:left;">${absents.join(', ')}</div>
            </div>` : '';

        const titlePrint = isMonthBasis ? `PHIẾU LƯƠNG THÁNG ${month}/${year}` : `PHIẾU LƯƠNG TUẦN NÀY`;

        Swal.fire({
            title: `<span style="color:var(--primary)">${titlePrint}</span>`,
            html: `<div style="text-align: left; font-size: 14px; border: 1px solid #eee; padding: 15px; border-radius: 10px; background: #fff;">
                    <p><b>Nhân viên:</b> ${name}</p><hr style="border: 0.5px dashed #ccc">
                    <div style="display:flex; justify-content: space-between; margin: 8px 0;"><span>Lương cứng (${cong}):</span><b>${Math.round(luong).toLocaleString('vi-VN')}đ</b></div>
                    ${hh > 0 ? `<div style="display:flex; justify-content: space-between; margin: 8px 0; color: #27ae60;"><span>Hoa hồng (${hhPct}%):</span><b>+ ${Math.round(hh).toLocaleString('vi-VN')}đ</b></div>` : ''}
                    <div style="display:flex; justify-content: space-between; margin: 8px 0; color: #27ae60;"><span>Phụ cấp:</span><b>+ ${pc.toLocaleString('vi-VN')}đ</b></div>
                    <div style="display:flex; justify-content: space-between; margin: 8px 0; color: #e74c3c;"><span>Tạm ứng:</span><b>- ${ung.toLocaleString('vi-VN')}đ</b></div>
                    <hr style="border: 1px solid #333"><div style="display:flex; justify-content: space-between; font-size: 18px; font-weight: bold; color: #c0392b;"><span>THỰC LÃNH:</span><span>${Math.round(tong).toLocaleString('vi-VN')}đ</span></div>
                    ${absentHtml}
                    ${myTC.length > 0 ? `<div style="margin-top:15px; border-top:1px solid #eee; padding-top:10px;"><p style="font-weight:bold; font-size:12px;">CHI TIẾT PHÁT SINH:</p>
                    <div style="overflow-x:auto"><table style="width:100%; font-size:11px;">${myTC.map(tc => `<tr><td style="white-space:nowrap">${new Date(tc.Ngay_Ghi).toLocaleDateString('vi-VN')}</td><td>${tc.Loai} (${tc.Noi_Dung || ''})</td><td align="right" style="white-space:nowrap">${Number(tc.So_Tien).toLocaleString('vi-VN')}đ</td></tr>`).join('')}</table></div></div>` : ''}</div>`,
            confirmButtonText: 'ĐÓNG', confirmButtonColor: '#2D5A27', width: '500px'
        });
    }

    function viewFinanceDetails(empId, empName, isMonthBasis) {
      const tcSource = isMonthBasis ? currentTcData : currentTcWeekData;
      const myTC = tcSource.filter(t => String(t.User_ID) === String(empId));
      if(myTC.length === 0) return Swal.fire('Thông báo', 'Không có khoản kê khai nào.', 'info');
      
      let rows = myTC.map(tc => {
        const d = new Date(tc.Ngay_Ghi);
        const dateStr = d.getDate() + "/" + (d.getMonth()+1) + "/" + d.getFullYear();
        return '<tr>' +
          '<td class="col-date">' + dateStr + '</td>' +
          '<td class="col-info"><b>' + tc.Loai + '</b><br><small>' + (tc.Noi_Dung || "") + '</small></td>' +
          '<td class="col-amount">' + Number(tc.So_Tien).toLocaleString("vi-VN") + 'đ</td>' +
          '<td class="col-action"><button onclick="deleteFinance(\'' + tc.id + '\')" class="btn" style="background:#e74c3c; padding:5px 8px; font-size:10px; flex:none;">Xóa</button></td>' +
        '</tr>';
      }).join('');

      Swal.fire({ 
        title: 'Kê khai: ' + empName, 
        html: '<div style="overflow-x:auto"><table class="finance-table">' + rows + '</table></div>', 
        width:'600px',
        confirmButtonText: 'ĐÓNG',
        confirmButtonColor: '#64748b'
      });
    }

    async function deleteFinance(id) {
       const r = await Swal.fire({ title: 'Xác nhận xóa?', text: 'Thao tác này không thể hoàn tác.', icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', cancelButtonColor: '#3085d6', confirmButtonText: 'XÓA NGAY' });
       if(r.isConfirmed) { await fetch(`${window.SB_CONFIG.URL}/rest/v1/BienDong_TaiChinh?id=eq.${id}`, { method: 'DELETE', headers: h }); loadPayroll(); }
    }

    function openFinanceModal(empId, empName) {
      Swal.fire({
        title: 'Nhập cho ' + empName,
        html: '<select id="sw-loai" class="swal2-input"><option value="Giao hàng">Giao hàng (+20k)</option><option value="Nhận hàng">Nhận hàng (+10k)</option><option value="Khác">Phụ cấp khác</option><option value="Tạm ứng">Tạm ứng</option></select><input id="sw-tien" type="number" class="swal2-input" placeholder="Số tiền..."><input id="sw-noidung" type="text" class="swal2-input" placeholder="Nội dung...">',
        showCancelButton: true,
        confirmButtonText: 'LƯU DỮ LIỆU',
        preConfirm: () => {
          const loai = document.getElementById('sw-loai').value; let tien = document.getElementById('sw-tien').value;
          if (loai === "Giao hàng" && !tien) tien = 20000; if (loai === "Nhận hàng" && !tien) tien = 10000;
          if (!tien) return Swal.showValidationMessage('Vui lòng nhập số tiền!');
          return { User_ID: empId, Loai: loai, So_Tien: Number(tien), Noi_Dung: document.getElementById('sw-noidung').value };
        }
      }).then(async (r) => { if (r.isConfirmed) { await fetch(`${window.SB_CONFIG.URL}/rest/v1/BienDong_TaiChinh`, { method: 'POST', headers: h, body: JSON.stringify({...r.value, Ngay_Ghi: new Date().toISOString(), Nguoi_Xac_Nhan: currentUser.name}) }); loadPayroll(); } });
    }
  </script>
</body>
</html>
