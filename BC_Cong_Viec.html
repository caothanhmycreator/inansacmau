<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Báo cáo công việc - Sắc Màu</title>
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/config.js"></script>
  <script src="js/auth_guard.js"></script>

  <style>
    :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f1f5f9; }
    body { margin: 0; background: var(--bg); display: flex; font-family: 'Segoe UI', sans-serif; }
    
    /* 1. SỬA LỖI TRÀN SIDEBAR */
    .main-content { flex: 1; margin-left: 250px; padding: 20px; transition: 0.3s; }

    .bc-container { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; }
    .bc-header { background: white; padding: 20px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
    
    .filter-group { display: flex; align-items: center; gap: 10px; background: #f8fafc; padding: 10px 15px; border-radius: 8px; border: 1px solid #e2e8f0; }
    .filter-group input { border: 1px solid #cbd5e1; padding: 8px; border-radius: 6px; outline: none; }
    .btn-view { background: var(--primary); color: white; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; }

    /* Stats Overview */
    .overview-grid { display: grid; grid-template-columns: 1fr; gap: 20px; padding: 20px; }
    .main-stat-card { background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); color: white; padding: 25px; border-radius: 12px; text-align: center; }
    .main-stat-value { font-size: 32px; font-weight: 800; margin: 5px 0; }

    /* Productivity Table */
    .prod-section { padding: 0 20px 20px 20px; }
    .prod-table { width: 100%; border-collapse: collapse; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
    .prod-table th { background: #f8fafc; padding: 15px; text-align: left; color: #64748b; font-size: 13px; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; }
    .prod-table td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
    
    .step-name { display: flex; align-items: center; gap: 10px; font-weight: 600; color: #1e293b; }
    .step-icon { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 6px; background: #f1f5f9; }
    
    .count-badge { background: #e0f2fe; color: #0369a1; padding: 4px 12px; border-radius: 20px; font-weight: 800; font-size: 14px; }
    .btn-check { background: none; border: 1px solid #e2e8f0; padding: 5px 12px; border-radius: 6px; cursor: pointer; color: #64748b; font-size: 12px; transition: 0.2s; }
    .btn-check:hover { background: var(--primary); color: white; }

    @media (max-width: 768px) { .main-content { margin-left: 0; } }
  </style>
</head>
<body>

  <div id="sidebar-placeholder"></div>

  <div class="main-content">
    <div class="bc-container">
      <div class="bc-header">
        <h2 style="margin:0; font-size: 20px; color: var(--primary);">📋 BÁO CÁO NĂNG SUẤT</h2>
        <div class="filter-group">
          <label style="font-size: 13px; font-weight: 600;">Chọn ngày:</label>
          <input type="date" id="report-date">
          <button class="btn-view" onclick="loadReportData()">XEM DỮ LIỆU</button>
        </div>
      </div>

      <div class="overview-grid">
        <div class="main-stat-card">
          <div style="font-size: 13px; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px;">Tổng số đơn nhận trong ngày</div>
          <div class="main-stat-value" id="val-tongDon">0</div>
          <div style="font-size: 12px; opacity: 0.7;">Đơn hàng mới được khởi tạo</div>
        </div>
      </div>

      <div class="prod-section">
        <h3 style="font-size: 15px; color: #475569; margin-bottom: 15px;">🚀 TIẾN ĐỘ THỰC HIỆN TRONG NGÀY</h3>
        <table class="prod-table">
          <thead>
            <tr>
              <th>Công đoạn sản xuất</th>
              <th style="text-align: center;">Số lượng đã xong</th>
              <th style="text-align: right;">Hành động</th>
            </tr>
          </thead>
          <tbody id="prod-body">
            </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // Cấu hình các khâu cần theo dõi (Khớp với cột trong Log_TienDo)
    const STEPS = [
      { label: "Xử lý đơn", col: "Gio_Xu_Ly", icon: "⏳", color: "#64748b" },
      { label: "Thiết kế", col: "Gio_Thiet_Ke", icon: "🎨", color: "#3b82f6" },
      { label: "Duyệt file", col: "Gio_Duyet_File", icon: "✅", color: "#8b5cf6" },
      { label: "In ấn", col: "Gio_In", icon: "🖨️", color: "#10b981" },
      { label: "Gia công", col: "Gio_Gia_Cong", icon: "⚙️", color: "#f59e0b" },
      { label: "Giao hàng/Thanh toán", col: "Gio_Thanh_Toan", icon: "🚚", color: "#ef4444" },
      { label: "Hoàn tất đơn", col: "Gio_Hoan_Tat", icon: "🎉", color: "#22c55e" }
    ];

    window.reportData = {};

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById('report-date').value = new Date().toISOString().split('T')[0];
      setTimeout(() => { loadReportData(); }, 600);
    });

    /** 🚀 2. TẢI DỮ LIỆU CHÍNH XÁC TỪ LOG_TIENDO */
    async function loadReportData() {
      const rawDate = document.getElementById('report-date').value;
      const [y, m, d] = rawDate.split('-');
      const dateStr = `${d}/${m}/${y}`; // Định dạng chuẩn Database

      Swal.fire({ title: 'Đang phân tích...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      const h = { 'apikey': window.SB_CONFIG.KEY, 'Authorization': `Bearer ${window.SB_CONFIG.KEY}` };

      try {
        const [resBH, resLog] = await Promise.all([
          fetch(`${window.SB_CONFIG.URL}/rest/v1/NhatKy_BanHang?Ngay_Gio=like.*${dateStr}*`, { headers: h }),
          fetch(`${window.SB_CONFIG.URL}/rest/v1/Log_TienDo?select=*`, { headers: h })
        ]);

        const dataBH = await resBH.json();
        const dataLog = await resLog.json();

        // 1. Tính tổng đơn mới (Gom nhóm theo Ma_Don)
        const newOrders = new Set(dataBH.map(it => it.Ma_Don));
        document.getElementById('val-tongDon').innerText = newOrders.size;

        // 2. Tính số lượng thực hiện từng giai đoạn (Dựa trên Log_TienDo)
        let stats = {};
        STEPS.forEach(s => stats[s.col] = []);

        dataLog.forEach(row => {
          STEPS.forEach(step => {
            const timeVal = row[step.col];
            if (timeVal && timeVal.includes(dateStr)) {
              stats[step.col].push(row);
            }
          });
        });

        window.reportData = stats;
        renderProductivityTable(stats);
        Swal.close();

      } catch (e) { Swal.fire('Lỗi', e.message, 'error'); }
    }

    /** 🚀 3. HIỂN THỊ BẢNG NĂNG SUẤT */
    function renderProductivityTable(stats) {
      const tbody = document.getElementById('prod-body');
      
      tbody.innerHTML = STEPS.map(step => {
        const count = stats[step.col].length;
        return `
          <tr>
            <td>
              <div class="step-name">
                <div class="step-icon" style="color: ${step.color}">${step.icon}</div>
                ${step.label}
              </div>
            </td>
            <td style="text-align: center;">
              <span class="count-badge">${count} món</span>
            </td>
            <td style="text-align: right;">
              <button class="btn-check" onclick="showStepDetail('${step.col}', '${step.label}')">Xem chi tiết</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    /** 🚀 4. POPUP XEM DANH SÁCH MÓN HÀNG THEO CÔNG ĐOẠN */
    window.showStepDetail = function(col, label) {
      const items = window.reportData[col];
      if (!items || items.length === 0) {
        return Swal.fire('Thông báo', 'Không có sản phẩm nào hoàn thành khâu này trong ngày.', 'info');
      }

      let html = `
        <div style="max-height:400px; overflow-y:auto;">
          <table style="width:100%; border-collapse:collapse; font-size:12px; text-align:left;">
            <thead>
              <tr style="background:#f1f5f9;">
                <th style="padding:10px;">Mã đơn</th>
                <th style="padding:10px;">Khách hàng</th>
                <th style="padding:10px;">Sản phẩm</th>
              </tr>
            </thead>
            <tbody>
              ${items.map(i => `
                <tr style="border-bottom:1px solid #eee;">
                  <td style="padding:10px;"><b>${i.Ma_Don}</b></td>
                  <td style="padding:10px;">${i.Khach_Hang}</td>
                  <td style="padding:10px;">${i.Ten_Hang}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>`;

      Swal.fire({
        title: `DANH SÁCH: ${label.toUpperCase()}`,
        html: html,
        width: '700px',
        confirmButtonColor: '#2c3e50',
        confirmButtonText: 'ĐÓNG'
      });
    };
  </script>
</body>
</html>
