<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Báo cáo năng suất - Sắc Màu</title>
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/config.js"></script>
  <script src="js/auth_guard.js"></script>

  <style>
    :root { --primary-dark: #2c3e50; --success: #27ae60; --bg-body: #f4f7f6; --border: #e2e8f0; }
    body { margin: 0; background: var(--bg-body); display: flex; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    
    /* 1. CỐ ĐỊNH SIDEBAR MARGIN */
    .main-content { flex: 1; margin-left: 250px; padding: 25px; transition: 0.3s; min-width: 0; }

    .bc-card { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; border: 1px solid var(--border); }
    
    .bc-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: white; }
    .bc-title { margin: 0; font-size: 20px; color: var(--primary-dark); font-weight: 800; display: flex; align-items: center; gap: 10px; }
    
    .filter-box { display: flex; align-items: center; gap: 12px; background: #f8fafc; padding: 10px 15px; border-radius: 10px; border: 1px solid var(--border); }
    .filter-box input { border: 1px solid #cbd5e1; padding: 8px; border-radius: 6px; outline: none; font-weight: 600; color: var(--primary-dark); }
    .btn-refresh { background: var(--primary-dark); color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.2s; }
    .btn-refresh:hover { background: #1a252f; transform: translateY(-1px); }

    /* Stats Banner */
    .stats-banner { display: grid; grid-template-columns: 1fr; padding: 20px; gap: 20px; }
    .stat-mini-card { background: #2c3e50; color: white; padding: 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
    .stat-label { font-size: 13px; opacity: 0.8; text-transform: uppercase; font-weight: 600; }
    .stat-value { font-size: 36px; font-weight: 900; }

    /* Productivity Table */
    .table-container { padding: 0 20px 20px 20px; }
    .productivity-table { width: 100%; border-collapse: collapse; background: white; }
    .productivity-table th { text-align: left; padding: 15px; background: #f1f5f9; color: #475569; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid var(--border); }
    .productivity-table td { padding: 16px 15px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    
    .milestone-name { display: flex; align-items: center; gap: 12px; font-weight: 700; color: #1e293b; font-size: 15px; }
    .milestone-icon { width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }

    .result-badge { background: #ecfdf5; color: #065f46; padding: 6px 14px; border-radius: 30px; font-weight: 800; font-size: 15px; border: 1px solid #a7f3d0; }
    .btn-detail { background: white; border: 1px solid #cbd5e1; padding: 6px 15px; border-radius: 6px; font-size: 12px; font-weight: 600; color: #64748b; cursor: pointer; transition: 0.2s; }
    .btn-detail:hover { background: #f8fafc; border-color: var(--primary-dark); color: var(--primary-dark); }

    @media (max-width: 1024px) { .main-content { margin-left: 0; } }
  </style>
</head>
<body>

  <div id="sidebar-placeholder"></div>

  <div class="main-content">
    <div class="bc-card">
      <div class="bc-header">
        <h2 class="bc-title">📊 BÁO CÁO NĂNG SUẤT</h2>
        <div class="filter-box">
          <input type="date" id="report-date">
          <button class="btn-refresh" onclick="loadDailyReport()">TRÍCH XUẤT</button>
        </div>
      </div>

      <div class="stats-banner">
        <div class="stat-mini-card">
          <div>
            <div class="stat-label">Số đơn mới nhận</div>
            <div style="font-size: 11px; opacity: 0.6;">Đơn hàng được khởi tạo trong ngày</div>
          </div>
          <div class="stat-value" id="val-new-orders">0</div>
        </div>
      </div>

      <div class="table-container">
        <table class="productivity-table">
          <thead>
            <tr>
              <th>Kết quả hoàn thành trong ngày</th>
              <th style="text-align: center;">Số lượng</th>
              <th style="text-align: right;">Danh sách</th>
            </tr>
          </thead>
          <tbody id="productivity-body">
            </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    /** 🚀 LOGIC ĐIỂM CHẠM: Đếm các món đã cập bến khâu tiếp theo thành công */
    const MILESTONES = [
      { label: "Đã xử lý xong (Chuyển thiết kế)", col: "Gio_Thiet_Ke", icon: "📋", color: "#f1f5f9" },
      { label: "Đã thiết kế xong (Chuyển duyệt)", col: "Gio_Duyet_File", icon: "🎨", color: "#e0f2fe" },
      { label: "Chốt File xong (Chuyển đi In)", col: "Gio_In", icon: "🖨️", color: "#dcfce7" },
      { label: "Đã in xong (Chuyển Gia công)", col: "Gio_Gia_Cong", icon: "⚙️", color: "#fef3c7" },
      { label: "Gia công xong (Chuyển Giao hàng)", col: "Gio_Thanh_Toan", icon: "🚚", color: "#fee2e2" },
      { label: "Đã hoàn tất toàn bộ đơn", col: "Gio_Hoan_Tat", icon: "🎉", color: "#f3e8ff" }
    ];

    window.cacheData = {};

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById('report-date').value = new Date().toISOString().split('T')[0];
      setTimeout(() => { loadDailyReport(); }, 600);
    });

    async function loadDailyReport() {
      const rawDate = document.getElementById('report-date').value;
      const [y, m, d] = rawDate.split('-');
      const dateStr = `${d}/${m}/${y}`; // Định dạng DD/MM/YYYY

      Swal.fire({ title: 'Đang tổng hợp...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      const h = { 'apikey': window.SB_CONFIG.KEY, 'Authorization': `Bearer ${window.SB_CONFIG.KEY}` };

      try {
        const [resBH, resLog] = await Promise.all([
          fetch(`${window.SB_CONFIG.URL}/rest/v1/NhatKy_BanHang?Ngay_Gio=like.*${dateStr}*`, { headers: h }),
          fetch(`${window.SB_CONFIG.URL}/rest/v1/Log_TienDo?select=*`, { headers: h })
        ]);

        const dataBH = await resBH.json();
        const dataLog = await resLog.json();

        // 1. Đếm đơn mới
        const uniqueOrders = new Set(dataBH.map(i => i.Ma_Don));
        document.getElementById('val-new-orders').innerText = uniqueOrders.size;

        // 2. Phân tích năng suất theo cột mốc giờ
        let stats = {};
        MILESTONES.forEach(m => stats[m.col] = []);

        dataLog.forEach(row => {
          MILESTONES.forEach(ms => {
            const timeVal = row[ms.col];
            if (timeVal && timeVal.includes(dateStr)) {
              stats[ms.col].push(row);
            }
          });
        });

        window.cacheData = stats;
        renderTable(stats);
        Swal.close();

      } catch (e) { Swal.fire('Lỗi', e.message, 'error'); }
    }

    function renderTable(stats) {
      const tbody = document.getElementById('productivity-body');
      tbody.innerHTML = MILESTONES.map(ms => {
        const count = stats[ms.col].length;
        return `
          <tr>
            <td>
              <div class="milestone-name">
                <div class="milestone-icon" style="background: ${ms.color}">${ms.icon}</div>
                ${ms.label}
              </div>
            </td>
            <td style="text-align: center;">
              <span class="result-badge">${count} món</span>
            </td>
            <td style="text-align: right;">
              <button class="btn-detail" onclick="showPopupDetail('${ms.col}', '${ms.label}')">Xem chi tiết</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    window.showPopupDetail = function(col, label) {
      const items = window.cacheData[col];
      if (!items || items.length === 0) return Swal.fire('Trống', 'Không có dữ liệu khâu này.', 'info');

      let html = `
        <div style="max-height:450px; overflow-y:auto; border:1px solid #eee; border-radius:8px;">
          <table style="width:100%; border-collapse:collapse; font-size:13px; text-align:left;">
            <thead>
              <tr style="background:#f8fafc; position:sticky; top:0;">
                <th style="padding:12px; border-bottom:2px solid #e2e8f0;">Mã đơn</th>
                <th style="padding:12px; border-bottom:2px solid #e2e8f0;">Khách hàng</th>
                <th style="padding:12px; border-bottom:2px solid #e2e8f0;">Sản phẩm</th>
              </tr>
            </thead>
            <tbody>
              ${items.map(i => `
                <tr style="border-bottom:1px solid #f1f5f9;">
                  <td style="padding:12px;"><b>${i.Ma_Don}</b></td>
                  <td style="padding:12px;">${i.Khach_Hang}</td>
                  <td style="padding:12px; color:#475569;">${i.Ten_Hang}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>`;

      Swal.fire({ title: label.toUpperCase(), html: html, width: '800px', confirmButtonColor: '#2c3e50' });
    };
  </script>
</body>
</html>
