<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - Sắc Màu</title>
  <meta charset="UTF-8">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/config.js"></script>
  <script src="js/auth_guard.js"></script>
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; }
    .main-content { flex: 1; margin-left: 250px; padding: 30px; transition: 0.3s; }
    .header { margin-bottom: 25px; border-bottom: 2px solid #2D5A27; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .stat-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); border-left: 5px solid #2D5A27; }
    .stat-card h4 { margin: 0; color: #666; font-size: 13px; text-transform: uppercase; }
    .stat-card p { margin: 10px 0 0 0; font-size: 24px; font-weight: bold; color: #2D5A27; }
    .staff-monitor { background: #e8f5e9; padding: 20px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #c8e6c9; }
    .staff-monitor h3 { margin: 0 0 15px 0; font-size: 16px; color: #2D5A27; display: flex; align-items: center; gap: 8px; }
    .staff-list { display: flex; flex-wrap: wrap; gap: 10px; }
    .staff-tag { background: white; padding: 8px 15px; border-radius: 20px; font-size: 13px; font-weight: 600; border: 1px solid #2D5A27; color: #2D5A27; display: flex; align-items: center; gap: 6px; }
    .staff-tag::before { content: ""; width: 8px; height: 8px; background: #27ae60; border-radius: 50%; box-shadow: 0 0 8px #27ae60; }
    .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
    .module-card { background: white; padding: 25px; border-radius: 15px; text-align: center; text-decoration: none; color: #333; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; border: 1px solid #eee; display: flex; flex-direction: column; align-items: center; }
    .module-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); border-color: #2D5A27; }
    .module-card i { font-size: 40px; margin-bottom: 15px; font-style: normal; }
    .module-card span { font-weight: bold; font-size: 14px; color: #2D5A27; }
    #sidebar-frame { width: 250px; height: 100vh; position: fixed; left: 0; top: 0; z-index: 9999; border: none; }
    @media (max-width: 768px) { .main-content { margin-left: 0; } #sidebar-frame { display:none; } }
  </style>
</head>
<body>

  <iframe src="sidebar.html" id="sidebar-frame"></iframe>

  <div class="main-content">
    <div class="header">
      <div>
        <h2 style="color: #2D5A27; margin: 0;">🏠 BẢNG ĐIỀU KHIỂN CHÍNH</h2>
        <p style="color: #666; margin: 5px 0;">Chào mừng trở lại, <b id="welcome-name">...</b>!</p>
      </div>
    </div>

    <div class="stat-container">
      <div class="stat-card"><h4>💰 Doanh thu tháng này</h4><p id="total-revenue">0đ</p></div>
      <div class="stat-card"><h4>👥 Nhân sự đang trực</h4><p id="active-count">0</p></div>
    </div>

    <div class="staff-monitor">
      <h3>🟢 NHÂN VIÊN ĐANG TẠI TIỆM</h3>
      <div id="active-staff-list" class="staff-list"><span style="color:#888">Đang nạp dữ liệu...</span></div>
    </div>

    <div id="dashboard-menu" class="dashboard-grid"></div>
  </div>

  <script>
    const h = { 'apikey': window.SB_CONFIG.KEY, 'Authorization': `Bearer ${window.SB_CONFIG.KEY}` };
    let lastCheckData = {};
    let isFirstLoad = true;

    // CẤU HÌNH ĐÃ KHỚP VỚI DATABASE TRONG ẢNH MỸ GỬI
    const NOTIFY_CONFIG = {
        "Admin": ["Tất cả"],
        "Thiet_Ke": ["Chờ thiết kế"],
        "Nhan_Vien_In": ["Chờ in"],
        "Quan_Ly_Don": ["Chờ xử lý", "Chờ duyệt file", "Chờ thiết kế", "Chờ in", "Chờ gia công", "Chờ thanh toán", "Chờ giao hàng"]
    };

    document.addEventListener("DOMContentLoaded", function() {
      const user = JSON.parse(localStorage.getItem('currentUser'));
      if(!user) return window.location.href = "login.html";
      
      document.getElementById('welcome-name').innerText = user.Ho_Ten || user.name || "Thành viên";
      
      renderMenu(user);
      loadLiveStatistics();

      // Xin quyền thông báo
      if ("Notification" in window && Notification.permission !== "granted") {
          Notification.requestPermission();
      }

      checkNewOrders(); 
      setInterval(checkNewOrders, 20000); // Quét mỗi 20 giây
    });

    function renderMenu(user) {
      const menuContainer = document.getElementById('dashboard-menu');
      const moduleStr = user.Danh_Sach_Module || user.modules || "";
      const userModules = moduleStr.split(',').map(s => s.trim());
      let html = "";
      if(window.APP_MODULES) {
          window.APP_MODULES.forEach(m => {
            if (userModules.includes(m.id)) {
              html += `<a href="${m.file}" class="module-card"><i>${m.icon}</i><span>${m.label}</span></a>`;
            }
          });
      }
      menuContainer.innerHTML = html || "<p>Bạn chưa được cấp quyền truy cập.</p>";
    }

    async function checkNewOrders() {
        const user = JSON.parse(localStorage.getItem('currentUser'));
        const role = user?.Vai_Tro || "";
        const states = NOTIFY_CONFIG[role] || [];
        if (states.length === 0) return;

        try {
            let q = states.includes("Tất cả") ? "" : `&Trang_Thai=in.(${states.join(',')})`;
            const res = await fetch(`${window.SB_CONFIG.URL}/rest/v1/NhatKy_BanHang?select=id,Trang_Thai,Ten_Khach${q}`, { headers: h });
            const data = await res.json();

            let newItems = [];
            data.forEach(item => {
                if (!lastCheckData[item.id] || lastCheckData[item.id] !== item.Trang_Thai) {
                    newItems.push(item);
                }
                lastCheckData[item.id] = item.Trang_Thai;
            });

            // Không báo ồn ào ở lần load đầu tiên (chỉ ghi nhớ dữ liệu)
            if (isFirstLoad) { isFirstLoad = false; return; }

            if (newItems.length > 0) {
                // Phát âm thanh báo động
                new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play().catch(() => {});
                
                // Hiện thông báo hệ điều hành
                if (Notification.permission === "granted") {
                    new Notification(`🔔 SẮC MÀU: CÓ ĐƠN MỚI`, { 
                        body: `Khách: ${newItems[0].Ten_Khach} - Trạng thái: ${newItems[0].Trang_Thai}`,
                        requireInteraction: true 
                    });
                }
                
                // Hiện thông báo giao diện web
                Swal.fire({
                    title: 'ĐƠN MỚI!',
                    text: `Có ${newItems.length} cập nhật mới trong bộ phận của bạn.`,
                    icon: 'info',
                    toast: true,
                    position: 'top-end',
                    timer: 8000,
                    showConfirmButton: false
                });
            }
        } catch (e) { console.error("Lỗi Notify:", e); }
    }

    async function loadLiveStatistics() {
      try {
        const now = new Date();
        const curMonth = String(now.getMonth() + 1).padStart(2, '0');
        const curYear = String(now.getFullYear());
        const todayStr = now.getFullYear() + '-' + curMonth + '-' + String(now.getDate()).padStart(2, '0');

        // Doanh thu tháng
        const resRev = await fetch(`${window.SB_CONFIG.URL}/rest/v1/NhatKy_BanHang?select=Ngay_Gio,Tong_Don`, { headers: h });
        const revData = await resRev.json();
        const total = revData.reduce((sum, item) => {
            if (item.Ngay_Gio && (item.Ngay_Gio.includes(`${curMonth}/${curYear}`) || item.Ngay_Gio.includes(`${curYear}-${curMonth}`))) {
                return sum + (Number(item.Tong_Don) || 0);
            }
            return sum;
        }, 0);
        document.getElementById('total-revenue').innerText = total.toLocaleString('vi-VN') + "đ";

        // Chấm công
        const statusQuery = encodeURIComponent("Đang làm");
        const resCC = await fetch(`${window.SB_CONFIG.URL}/rest/v1/NhatKy_ChamCong?Ngay=eq.${todayStr}&Status=eq.${statusQuery}&select=Gio_Vao,DM_NhanVien(Ho_Ten)`, { headers: h });
        const ccData = await resCC.json();
        document.getElementById('active-count').innerText = ccData.length;
        document.getElementById('active-staff-list').innerHTML = ccData.length > 0 ? 
            ccData.map(item => `<div class="staff-tag">${item.DM_NhanVien?.Ho_Ten || 'N/A'} <small>(${item.Gio_Vao?.substring(0,5)})</small></div>`).join('') : 
            '<span style="color:#888">Hiện không có ai trực.</span>';
      } catch (e) {}
    }
  </script>
</body>
</html>
