<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - Sắc Màu</title>
  <meta charset="UTF-8">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/config.js"></script>
  <script src="js/auth_guard.js"></script>
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; }
    .main-content { flex: 1; margin-left: 250px; padding: 30px; transition: 0.3s; }
    .header { margin-bottom: 25px; border-bottom: 2px solid #2D5A27; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    
    /* Chỉ số Header */
    .stat-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); border-left: 5px solid #2D5A27; }
    .stat-card h4 { margin: 0; color: #666; font-size: 13px; text-transform: uppercase; }
    .stat-card p { margin: 10px 0 0 0; font-size: 24px; font-weight: bold; color: #2D5A27; }

    /* Trạng thái nhân viên */
    .staff-monitor { background: #e8f5e9; padding: 20px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #c8e6c9; }
    .staff-monitor h3 { margin: 0 0 15px 0; font-size: 16px; color: #2D5A27; display: flex; align-items: center; gap: 8px; }
    .staff-list { display: flex; flex-wrap: wrap; gap: 10px; }
    .staff-tag { background: white; padding: 8px 15px; border-radius: 20px; font-size: 13px; font-weight: 600; border: 1px solid #2D5A27; color: #2D5A27; display: flex; align-items: center; gap: 6px; }
    .staff-tag::before { content: ""; width: 8px; height: 8px; background: #27ae60; border-radius: 50%; box-shadow: 0 0 8px #27ae60; }
    .no-staff { color: #888; font-style: italic; font-size: 13px; }

    /* Lưới các ô chức năng */
    .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
    .module-card { 
      background: white; padding: 25px; border-radius: 15px; text-align: center; 
      text-decoration: none; color: #333; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      transition: 0.3s; border: 1px solid #eee; display: flex; flex-direction: column; align-items: center;
    }
    .module-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); border-color: #2D5A27; }
    .module-card i { font-size: 40px; margin-bottom: 15px; }
    .module-card span { font-weight: bold; font-size: 15px; color: #2D5A27; }

    @media (max-width: 768px) { 
      .main-content { margin-left: 0; padding: 20px; } 
      #sidebar-frame { left: -250px; }
    }
    
    #sidebar-frame { width: 250px; height: 100vh; position: fixed; left: 0; top: 0; z-index: 9999; border: none; }
    @media (min-width: 769px) { .mobile-nav-btn { display: none; } }
  </style>
</head>
<body>

 <button class="mobile-nav-btn no-print" onclick="toggleMobileSidebar()">☰ MENU</button>
 <iframe src="sidebar.html" id="sidebar-frame" frameborder="0" class="no-print"></iframe>

  <div class="main-content">
    <div class="header">
      <div>
        <h2 style="color: #2D5A27; margin: 0;">🏠 BẢNG ĐIỀU KHIỂN CHÍNH</h2>
        <p style="color: #666; margin: 5px 0;">Chào mừng trở lại, <b id="welcome-name">...</b>!</p>
      </div>
    </div>

    <div class="stat-container">
      <div class="stat-card">
        <h4>💰 Doanh thu tháng này</h4>
        <p id="total-revenue">0đ</p>
      </div>
      <div class="stat-card">
        <h4>👥 Nhân sự đang trực</h4>
        <p id="active-count">0</p>
      </div>
    </div>

    <div class="staff-monitor">
      <h3>🟢 NHÂN VIÊN ĐANG TẠI TIỆM</h3>
      <div id="active-staff-list" class="staff-list">
        <span class="no-staff">Đang nạp dữ liệu...</span>
      </div>
    </div>

    <div id="dashboard-menu" class="dashboard-grid">
      </div>
  </div>

  <script>
    const h = { 'apikey': window.SB_CONFIG.KEY, 'Authorization': `Bearer ${window.SB_CONFIG.KEY}` };
    let lastCheckData = {}; // Lưu trữ để so sánh đơn mới/cũ tránh báo lặp

    // Cấu hình trạng thái theo dõi cho từng vai trò
    const NOTIFY_CONFIG = {
        "Admin": ["Tất cả"],
        "Thiết kế": ["Chờ thiết kế"],
        "Nhân viên in": ["Chờ in"],
        "Thu ngân": ["Chờ xử lý", "Chờ duyệt file", "Chờ thiết kế", "Chờ in", "Chờ gia công", "Chờ thanh toán", "Chờ giao hàng"]
    };

    document.addEventListener("DOMContentLoaded", function() {
      const user = JSON.parse(localStorage.getItem('currentUser'));
      if(!user) return;
      document.getElementById('welcome-name').innerText = user.Ho_Ten || user.name;
      
      renderMenu(user);
      loadLiveStatistics();

      // Xin quyền thông báo trình duyệt
      if ("Notification" in window && Notification.permission !== "granted") {
          Notification.requestPermission();
      }

      // Vòng lặp kiểm tra đơn hàng mới mỗi 20 giây
      setInterval(checkNewOrders, 20000);
    });

    /** 1. Render Menu theo phân quyền */
    function renderMenu(user) {
      const menuContainer = document.getElementById('dashboard-menu');
      const moduleString = user.Danh_Sach_Module || user.modules || "";
      const userModules = moduleString.split(',').map(s => s.trim());
      
      let html = "";
      window.APP_MODULES.forEach(m => {
        if (userModules.includes(m.id)) {
          html += `<a href="${m.file}" class="module-card"><i>${m.icon}</i><span>${m.label}</span></a>`;
        }
      });
      menuContainer.innerHTML = html;
    }

    /** 2. Kiểm tra đơn hàng mới theo vai trò */
    async function checkNewOrders() {
        const user = JSON.parse(localStorage.getItem('currentUser'));
        if (!user) return;

        const role = user.Vai_Tro || "Nhân viên";
        let statesToWatch = NOTIFY_CONFIG[role] || [];
        if (statesToWatch.length === 0) return;

        try {
            let query = "";
            // Nếu không phải Admin, tạo câu lệnh lọc theo danh sách trạng thái
            if (!statesToWatch.includes("Tất cả")) {
                const statusFilter = statesToWatch.join(',');
                query = `&Trang_Thai=in.(${statusFilter})`;
            }

            const res = await fetch(`${window.SB_CONFIG.URL}/rest/v1/NhatKy_BanHang?select=id,Trang_Thai,Ten_Khach${query}`, { headers: h });
            const data = await res.json();

            let hasNew = false;
            let newItems = [];

            data.forEach(item => {
                // Nếu là đơn mới chưa từng lưu hoặc trạng thái đã thay đổi
                if (!lastCheckData[item.id] || lastCheckData[item.id] !== item.Trang_Thai) {
                    hasNew = true;
                    newItems.push(item);
                }
                lastCheckData[item.id] = item.Trang_Thai;
            });

            if (hasNew && newItems.length > 0) {
                triggerAlert(role, newItems);
            }
        } catch (e) { console.error("Lỗi thông báo:", e); }
    }

    /** 3. Phát báo động và hiện thông báo */
    function triggerAlert(role, items) {
        // Phát âm thanh
        const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
        audio.play().catch(e => console.log("Cần tương tác với web để phát âm thanh"));

        const count = items.length;
        const first = items[0];

        // Thông báo hệ thống (Windows/macOS)
        if (Notification.permission === "granted") {
            new Notification(`🔔 SẮC MÀU: ${role.toUpperCase()}`, {
                body: `Bạn có ${count} công việc mới. Khách: ${first.Ten_Khach}`,
                icon: "https://i.ibb.co/m56L6vS/drive-icon.png",
                requireInteraction: true // Thông báo đứng yên đến khi bấm vào
            });
        }

        // Thông báo giao diện Web
        Swal.fire({
            title: `🔔 CÓ ĐƠN MỚI (${role})`,
            html: `Có đơn hàng vừa được cập nhật.<br>Khách gần nhất: <b>${first.Ten_Khach}</b>`,
            icon: 'info',
            toast: true,
            position: 'top-end',
            showConfirmButton: true,
            confirmButtonText: 'ĐÃ XEM',
            confirmButtonColor: '#2D5A27'
        });
    }

    /** 4. Tải dữ liệu Doanh thu & Chấm công (Giữ nguyên logic ổn định) */
    async function loadLiveStatistics() {
      try {
        const now = new Date();
        const curMonth = String(now.getMonth() + 1).padStart(2, '0
