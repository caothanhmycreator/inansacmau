<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nhập Hàng & Phân Bổ Kho - Sắc Màu</title>
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/config.js"></script>
  <script src="js/auth_guard.js"></script>
  <script src="js/sidebar_loader.js"></script> 
  <style>
    :root { --primary: #2D5A27; --bg: #f4f7f6; --border: #e2e8f0; --accent: #2980b9; }
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; }
    #sidebar-frame { width: 250px; height: 100vh; position: fixed; left: 0; top: 0; border: none; z-index: 999; transition: 0.3s; }
    .main-content { flex: 1; margin-left: 250px; padding: 25px; transition: 0.3s; min-width: 0; }

    /* Box Thống kê tiền nhập hàng */
    .summary-box { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; padding: 15px 20px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .summary-box h3 { margin: 0; font-size: 14px; opacity: 0.9; text-transform: uppercase; }
    .summary-box .amount { font-size: 24px; font-weight: bold; margin-top: 5px; color: #f1c40f; }
    
    /* Form Card Nhập hàng */
    .form-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 5px solid var(--accent); }
    .form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
    .input-group { display: flex; flex-direction: column; position: relative; }
    .input-group label { font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #475569; text-transform: uppercase; }
    .input-modern { padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; font-size: 14px; transition: 0.3s; width: 100%; box-sizing: border-box; }
    .input-modern:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(41, 128, 185, 0.1); }

    /* Gợi ý (Suggestions) */
    .suggestions-box { position: absolute; top: calc(100% + 2px); left: 0; right: 0; background: white; border: 1px solid #ddd; border-radius: 8px; z-index: 1000; max-height: 250px; overflow-y: auto; box-shadow: 0 10px 20px rgba(0,0,0,0.15); display: none; }
    .suggestion-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #f1f1f1; font-size: 13px; display: flex; align-items: center; }
    .suggestion-item:hover { background: #f8fafc; color: var(--accent); border-left: 3px solid var(--accent); }

    .inventory-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

    /* Bảng dữ liệu chuẩn */
    .table-modern { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; }
    .table-modern th { background: #f1f5f9; color: #64748b; font-size: 12px; text-transform: uppercase; padding: 12px; border-bottom: 2px solid #e2e8f0; text-align: left; }
    .table-modern td { padding: 12px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    .table-modern tr:hover { background: #f8fafc; }
    
    .btn-submit { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; height: 100%; width: 100%; box-sizing: border-box; font-size: 14px; }
    .btn-submit:hover { background: #1f618d; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(41, 128, 185, 0.2); }
    .btn-edit { background: none; color: #2980b9; border: none; cursor: pointer; font-weight: bold; padding: 5px; font-size: 13px; }
    .btn-del { background: none; color: #e74c3c; border: none; cursor: pointer; font-weight: bold; padding: 5px; font-size: 13px; }

    /* Badge Trạng thái Thanh Toán */
    .badge-paid { background: #dcfce7; color: #166534; padding: 3px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; border: 1px solid #bbf7d0; display: inline-block; margin-top: 3px;}
    .badge-unpaid { background: #fee2e2; color: #b91c1c; padding: 3px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; border: 1px solid #fecaca; display: inline-block; margin-top: 3px;}

    /* CSS Nút lọc NCC */
    .ncc-filter-container { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; }
    .ncc-btn { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; white-space: nowrap; border: 1px solid #cbd5e1; background: white; color: #475569; transition: 0.2s; }
    .ncc-btn:hover { background: #f1f5f9; }
    .ncc-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    @media (max-width: 768px) {
        #sidebar-frame { left: -250px; }
        .main-content { margin-left: 0 !important; padding: 15px; padding-top: 65px; }
        body.sidebar-open #sidebar-frame { left: 0; }
        .mobile-nav-btn { display: block; position: fixed; top: 10px; left: 10px; z-index: 1000; background: var(--accent); color: white; padding: 8px 12px; border: none; border-radius: 4px; }
        
        .form-grid { grid-template-columns: 1fr !important; }
        .input-group { grid-column: span 1 !important; }
        .summary-box { flex-direction: column; align-items: flex-start; gap: 10px; }
        
        .search-area { width: 100%; flex-direction: column; align-items: stretch !important; }
        #searchFilter { max-width: 100% !important; }
        #thanhToanFilter { max-width: 100% !important; width: 100% !important; }

        .table-modern, .table-modern thead, .table-modern tbody, .table-modern th, .table-modern td, .table-modern tr { display: block; width: 100%; box-sizing: border-box; }
        .table-modern thead { display: none; }
        
        .table-modern tr { margin-bottom: 15px; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px; background: #fff; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .table-modern td { border: none; padding: 8px 5px 8px 100px; position: relative; min-height: 35px; display: flex; align-items: center; justify-content: space-between; }
        .table-modern td:before { position: absolute; left: 10px; width: 85px; font-weight: bold; color: #64748b; font-size: 11px; text-transform: uppercase; content: attr(data-label); }
    }
    @media (min-width: 769px) { .mobile-nav-btn { display: none; } }
  </style>
</head>
<body>

  <div class="main-content">
    <div class="header-top" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
      <div>
        <h2 style="margin:0; color: var(--accent);">📦 QUẢN LÝ NHẬP HÀNG & TỒN KHO</h2>
        <p style="color: #666; font-size: 14px; margin: 5px 0 0 0;">Ghi nhận chi phí và tự động cập nhật số lượng vật tư, nguyên liệu</p>
      </div>
    </div>

    <div class="summary-box">
      <div>
        <h3>TỔNG TIỀN NHẬP HÀNG</h3>
        <div class="amount" id="tongTienThang">0 đ</div>
      </div>
      <div style="display: flex; gap: 10px; align-items: center;">
        <input type="month" id="monthFilter" class="input-modern" style="color: #333;" onchange="filterDisplayList()">
        <button onclick="viewAllMonths()" style="background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; white-space: nowrap;">XEM TẤT CẢ</button>
      </div>
    </div>

    <div class="form-card">
      <div class="form-grid">
        <div class="input-group" style="grid-column: span 2;">
          <label>Tên Sản Phẩm / Vật Tư *</label>
          <input type="text" id="f-ten" class="input-modern" placeholder="Gõ để tìm gợi ý hoặc nhập tên mới..." autocomplete="off" oninput="handleSearch(this.value)" onfocus="handleSearch(this.value)" onblur="setTimeout(()=>closeSuggestions(), 200)">
          <div id="suggestions" class="suggestions-box"></div>
          <input type="hidden" id="f-id"> 
        </div>
        <div class="input-group">
          <label>Mã Hàng (Mã QR/SKU)</label>
          <input type="text" id="f-ma" class="input-modern" placeholder="Hệ thống tự tạo nếu trống">
        </div>
        <div class="input-group">
          <label>Nhóm Hàng</label>
          <input type="text" id="f-nhom" class="input-modern" placeholder="In ấn, Standee, Quà tặng...">
        </div>
        
        <div class="input-group">
          <label>Đơn Vị Tính</label>
          <input type="text" id="f-dvt" class="input-modern" placeholder="Cuộn, m2, cái, tờ...">
        </div>
        <div class="input-group">
          <label>Số Lượng *</label>
          <input type="number" id="f-sl" class="input-modern" value="1" min="1" step="any" oninput="updateThanhTien()">
        </div>
        <div class="input-group">
          <label>Đơn Giá Nhập (VNĐ)</label>
          <input type="text" id="f-dongia" class="input-modern" value="0" oninput="formatCurrency(this); updateThanhTien()">
        </div>
        <div class="input-group">
          <label>Thành Tiền (VNĐ) *</label>
          <input type="text" id="f-thanhtien" class="input-modern" value="0" readonly style="background:#fff3cd; color:#d35400; font-weight: bold;">
        </div>

        <div class="input-group" style="grid-column: span 2;">
          <label>Nhà Cung Cấp</label>
          <input type="text" id="f-ncc" class="input-modern" list="nccList" placeholder="Chọn hoặc gõ tên nhà cung cấp mới...">
          <datalist id="nccList"></datalist>
        </div>
        <div class="input-group">
          <label>Loại Hàng *</label>
          <select id="f-loaihang" class="input-modern" style="cursor: pointer;">
            <option value="Vật tư (Phôi thiệp, Khung, Standee,...)">Vật tư (Phôi thiệp, Khung, Standee,...)</option>
            <option value="Nguyên liệu (Giấy, Mực, Màng, Giấy ép,...)">Nguyên liệu (Giấy, Mực, Màng,...)</option>
            <option value="Khác">Khác</option>
          </select>
        </div>
        <div class="input-group">
          <label>Thanh Toán *</label>
          <select id="f-thanhtoan" class="input-modern" style="cursor: pointer; color: #2c3e50; font-weight: bold;">
            <option value="Đã thanh toán">Đã thanh toán</option>
            <option value="Chưa thanh toán">Chưa thanh toán</option>
          </select>
        </div>
        
        <div class="input-group" style="grid-column: span 3;">
          <label>Ghi Chú</label>
          <input type="text" id="f-ghichu" class="input-modern" placeholder="Lô hàng bị lỗi, nợ tiền,...">
        </div>
        <div class="input-group" style="align-items: flex-end;">
          <button id="btn-save" class="btn-submit" onclick="submitImport()">📥 XÁC NHẬN NHẬP HÀNG</button>
        </div>
      </div>
    </div>

    <div class="inventory-card">
      <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 10px;">
        <h3 style="margin:0;">📋 LỊCH SỬ TẤT CẢ LƯỢT NHẬP HÀNG</h3>
        <div class="search-area" style="display: flex; gap: 10px; flex: 1; justify-content: flex-end; align-items: center;">
          <select id="thanhToanFilter" class="input-modern" style="width: 150px; cursor: pointer; color: #2c3e50; font-weight: bold;" onchange="filterDisplayList()">
            <option value="">Tất cả TT</option>
            <option value="Đã thanh toán">Đã trả</option>
            <option value="Chưa thanh toán">Nợ</option>
          </select>
          <input type="text" id="searchFilter" class="input-modern" placeholder="🔍 Tìm kiếm trực tiếp..." style="max-width: 250px; flex: 1;" onkeyup="filterDisplayList()">
          <button onclick="loadData()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-weight:bold; white-space: nowrap;">🔄 Tải lại bảng</button>
        </div>
      </div>
      
      <div id="ncc-filter-container" class="ncc-filter-container"></div>

      <div style="overflow-x: auto;">
        <table class="table-modern">
            <thead>
                <tr>
                    <th style="width:140px;">Ngày Nhập</th>
                    <th>Tên Sản Phẩm</th>
                    <th>Nhà Cung Cấp</th>
                    <th style="width:120px;">Loại Hàng</th>
                    <th style="width:80px; text-align:center;">SL/ĐVT</th>
                    <th style="width:100px; text-align:right;">Đơn Giá</th>
                    <th style="width:120px; text-align:right;">Thành Tiền</th>
                    <th style="width:100px; text-align:center;">Thao tác</th>
                </tr>
            </thead>
            <tbody id="data-container">
                <tr><td colspan="8" style="text-align:center; padding:20px; color:#888;">🔍 Đang tải dữ liệu toàn bảng...</td></tr>
            </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const TABLE_NHAP_HANG = "NhatKy_NhapHang";
    
    let masterData = [];     
    let dsSanPham = [];      
    let dsKhoVatTu = [];     
    let isEditingMode = false; 
    let currentNccFilter = ""; 

    document.addEventListener("DOMContentLoaded", () => {
      const now = new Date();
      document.getElementById('monthFilter').value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
      
      setTimeout(loadData, 500);
      
      document.addEventListener('click', function(e) {
        if (e.target.id !== 'f-ten') document.getElementById('suggestions').style.display = 'none';
      });
    });

    function formatCurrency(input) {
      let v = input.value.replace(/\D/g, "");
      input.value = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }
    function parseNum(s) { return Number(s.toString().replace(/\./g, "")) || 0; }
    
    function updateThanhTien() {
        const sl = parseFloat(document.getElementById('f-sl').value) || 0;
        const dongia = parseNum(document.getElementById('f-dongia').value);
        document.getElementById('f-thanhtien').value = (sl * dongia).toLocaleString('vi-VN');
    }

    // HIỂN THỊ NGÀY THÁNG ĐÚNG CHUẨN VIỆT NAM (HH:mm DD/MM/YYYY)
    function formatToVietnameseTime(dateString) {
        if (!dateString) return 'N/A';
        try {
            // Xử lý chuẩn ISO của Supabase
            if (dateString.includes('T')) {
                const d = new Date(dateString);
                if (!isNaN(d.getTime())) {
                    const pad = (n) => n.toString().padStart(2, '0');
                    return `${pad(d.getHours())}:${pad(d.getMinutes())} ${pad(d.getDate())}/${pad(d.getMonth() + 1)}/${d.getFullYear()}`;
                }
            }
            // Xử lý chuẩn tự lưu cũ
            const parts = dateString.split(' ');
            if (parts.length >= 2 && parts[0].includes('-')) {
                const dateParts = parts[0].split('-'); 
                const timeParts = parts[1].split(':'); 
                if (dateParts.length === 3 && timeParts.length >= 2) {
                    return `${timeParts[0]}:${timeParts[1]} ${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;
                }
            }
            return dateString; 
        } catch(e) {
            return dateString;
        }
    }

    async function loadData() {
      const h = { 'apikey': window.SB_CONFIG.KEY, 'Authorization': `Bearer ${window.SB_CONFIG.KEY}` };
      try {
        const resSP = await fetch(`${window.SB_CONFIG.URL}/rest/v1/Bang_Gia_San_Pham?select=*`, { headers: h });
        if(resSP.ok) dsSanPham = await resSP.json();

        const resKho = await fetch(`${window.SB_CONFIG.URL}/rest/v1/Kho_Vat_Tu?select=*`, { headers: h });
        if(resKho.ok) dsKhoVatTu = await resKho.json();

        const res = await fetch(`${window.SB_CONFIG.URL}/rest/v1/${TABLE_NHAP_HANG}?select=*`, { headers: h });
        if (!res.ok) {
            const errInfo = await res.json();
            throw new Error(errInfo.message || "Tên bảng không tồn tại");
        }
        
        const resData = await res.json();
        masterData = Array.isArray(resData) ? resData : [];
        
        masterData.sort((a, b) => {
            const idA = a.id || a.Id || 0;
            const idB = b.id || b.Id || 0;
            return idB - idA; 
        });
        
        const nccSet = new Set(masterData.map(i => (i.Nha_Cung_Cap || "KHÁCH VÃNG LAI").trim()));
        document.getElementById('nccList').innerHTML = [...nccSet].map(ncc => `<option value="${ncc}">`).join('');

        renderNccButtons([...nccSet]);

        filterDisplayList(); 
      } catch (e) { 
          console.error("Lỗi tải dữ liệu:", e); 
          document.getElementById('data-container').innerHTML = `<tr><td colspan="8" style="text-align:center; color:#e74c3c; font-weight:bold;">Lỗi tải dữ liệu: ${e.message}</td></tr>`;
      }
    }

    function renderNccButtons(nccList) {
        const container = document.getElementById('ncc-filter-container');
        let html = `<button class="ncc-btn ${currentNccFilter === '' ? 'active' : ''}" onclick="setNccFilter('')">Tất Cả</button>`;
        
        nccList.sort().forEach(ncc => {
            if(ncc) {
                html += `<button class="ncc-btn ${currentNccFilter === ncc ? 'active' : ''}" onclick="setNccFilter('${ncc.replace(/'/g, "\\'")}')">${ncc}</button>`;
            }
        });
        container.innerHTML = html;
    }

    window.setNccFilter = function(ncc) {
        currentNccFilter = ncc;
        const nccSet = new Set(masterData.map(i => (i.Nha_Cung_Cap || "KHÁCH VÃNG LAI").trim()));
        renderNccButtons([...nccSet]);
        filterDisplayList();
    }

    // ==========================================
    // AUTOCOMPLETE THÔNG MINH TỪ KHO VẬT TƯ
    // ==========================================
    function handleSearch(val) {
        if(isEditingMode) return; 

        const box = document.getElementById('suggestions');
        const keyword = (val || "").toLowerCase().trim();
        
        let filtered = dsKhoVatTu;
        if (keyword) {
            filtered = dsKhoVatTu.filter(item => 
                (item.Ten_Hang && item.Ten_Hang.toLowerCase().includes(keyword)) || 
                (item.Ma_QR && item.Ma_QR.toLowerCase().includes(keyword))
            );
        }
        filtered = filtered.slice(0, 15);

        if (filtered.length === 0 || !keyword) { box.style.display = 'none'; return; }

        box.innerHTML = filtered.map(item => {
            let imgTag = '';
            let rawImg = item.Hinh_Anh;
            
            if (rawImg && String(rawImg).trim() !== "" && String(rawImg) !== "null") {
                let fileId = "";
                if (rawImg.includes("drive.google.com")) {
                    let matchD = rawImg.match(/\/d\/([a-zA-Z0-9_-]+)/);
                    let matchId = rawImg.match(/[?&]id=([a-zA-Z0-9_-]+)/);
                    fileId = (matchD && matchD[1]) || (matchId && matchId[1]);
                }
                if (fileId) {
                    let finalImgUrl = `https://drive.google.com/thumbnail?id=${fileId}&sz=w200`;
                    let fullImgUrl = `https://drive.google.com/thumbnail?id=${fileId}&sz=w800`;
                    imgTag = `<img src="${finalImgUrl}" onclick="event.stopPropagation(); showFullImage('${fullImgUrl}', '${item.Ten_Hang.replace(/'/g, "\\'")}')" style="width:45px; height:45px; object-fit:cover; border-radius:4px; margin-right:12px; flex-shrink:0; border: 1px solid #eee; cursor: zoom-in;">`;
                } else {
                    imgTag = `<div style="width:45px; height:45px; background:#f0f0f0; border-radius:4px; margin-right:12px; display:flex; align-items:center; justify-content:center; font-size:12px; color:#aaa;">🖼️</div>`;
                }
            } else {
                imgTag = `<div style="width:45px; height:45px; background:#f0f0f0; border-radius:4px; margin-right:12px; display:flex; align-items:center; justify-content:center; font-size:12px; color:#aaa;">🖼️</div>`;
            }

            let dvt = item.Quy_Cach || item.DVT || '';
            
            return `
            <div class="suggestion-item" onclick="selectItem('${item.Ma_QR || ''}', '${item.Ten_Hang.replace(/'/g, "\\'")}', '${item.Nhom_Hang || ''}', '${dvt}', 0)">
                ${imgTag}
                <div style="display:flex; flex-direction:column;">
                    <span><b style="color:#2c3e50;">${item.Ten_Hang}</b></span>
                    <span style="color:#7f8c8d; font-size:11px;">Mã: ${item.Ma_QR || 'N/A'} | Nhóm: ${item.Nhom_Hang || '-'} | ĐVT: ${dvt || '-'}</span>
                </div>
            </div>`
        }).join('');
        box.style.display = 'block';
    }

    function selectItem(ma, ten, nhom, dvt, giavon) {
        document.getElementById('f-ma').value = ma;
        document.getElementById('f-ten').value = ten;
        document.getElementById('f-nhom').value = nhom;
        document.getElementById('f-dvt').value = dvt;
        document.getElementById('f-dongia').value = Number(giavon).toLocaleString('vi-VN');
        updateThanhTien();
        document.getElementById('suggestions').style.display = 'none';
    }

    function closeSuggestions() { document.getElementById('suggestions').style.display = 'none'; }

    // ==========================================
    // LOGIC HOÀN TRẢ KHO & XÓA NGUYÊN LIỆU KHI SỬA / XÓA
    // ==========================================
    async function revertInventory(logRecord) {
        const h = { 'apikey': window.SB_CONFIG.KEY, 'Authorization': `Bearer ${window.SB_CONFIG.KEY}`, 'Content-Type': 'application/json' };
        let maToRevert = logRecord.Ma_Hang;
        let loai = logRecord.Loai_Hang || "";
        let slToRevert = parseFloat(logRecord.So_Luong) || 0;

        let spDB = dsSanPham.find(s => s.Ma_QR === maToRevert || s.Ten_Hang === logRecord.Ten_Hang);
        if (spDB && spDB.Ghi_Chu && spDB.Ghi_Chu.startsWith("SMK-")) {
            maToRevert = spDB.Ghi_Chu; 
        }

        if (loai.includes("Nguyên liệu") || (maToRevert && maToRevert.startsWith("NEW-"))) {
            // Xóa dứt điểm nhật ký nhập bên Nhatky_nguyenlieu để đảm bảo luồng phân lập
            await fetch(`${window.SB_CONFIG.URL}/rest/v1/Nhatky_nguyenlieu?Ma_Nguyen_Lieu=eq.${maToRevert}&Ngay_Gio=eq.${encodeURIComponent(logRecord.Ngay_Gio)}`, { 
                method: 'DELETE', headers: h 
            });
        } else if (loai.includes("Vật tư") || (maToRevert && maToRevert.startsWith("SMK-"))) {
            let res = await fetch(`${window.SB_CONFIG.URL}/rest/v1/Kho_Vat_Tu?Ma_QR=eq.${maToRevert}`, { headers: h });
            let data = await res.json();
            if (data && data.length > 0) {
                let tonMoi = (parseFloat(data[0].So_Luong) || 0) - slToRevert;
                await fetch(`${window.SB_CONFIG.URL}/rest/v1/Kho_Vat_Tu?id=eq.${data[0].id || data[0].Id}`, { 
                    method: 'PATCH', headers: h, body: JSON.stringify({ So_Luong: tonMoi }) 
                });
            }
        }
    }

    // ==========================================
    // LƯU DỮ LIỆU ĐỘC LẬP
    // ==========================================
    async function submitImport() {
        const idLog = document.getElementById('f-id').value;
        const ten = document.getElementById('f-ten').value.trim();
        let ma = document.getElementById('f-ma').value.trim();
        const nhom = document.getElementById('f-nhom').value.trim() || "Chưa phân loại";
        const dvt = document.getElementById('f-dvt').value.trim();
        const sl = parseFloat(document.getElementById('f-sl').value) || 0;
        const dongia = parseNum(document.getElementById('f-dongia').value);
        const tien = parseNum(document.getElementById('f-thanhtien').value);
        const ncc = document.getElementById('f-ncc').value.trim() || "KHÁCH VÃNG LAI";
        const loaiHang = document.getElementById('f-loaihang').value;
        const thanhToan = document.getElementById('f-thanhtoan').value;
        const gc = document.getElementById('f-ghichu').value.trim();
        
        if (!ten) return Swal.fire('Lỗi', 'Vui lòng nhập Tên hàng hóa!', 'warning');
        if (sl <= 0) return Swal.fire('Lỗi', 'Số lượng phải lớn hơn 0!', 'warning');

        Swal.fire({ title: 'Đang xử lý sổ sách & kho...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        const h = { 'apikey': window.SB_CONFIG.KEY, 'Authorization': `Bearer ${window.SB_CONFIG.KEY}`, 'Content-Type': 'application/json' };
        
        try {
            const d = new Date();
            const pad = (n) => n.toString().padStart(2, '0');
            const ngayGio = `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
            
            if (isEditingMode && idLog) {
                const oldLog = masterData.find(x => String(x.id || x.Id) === String(idLog));
                if (oldLog) await revertInventory(oldLog);
            }

            let finalMaHang = ma;
            let spDB = dsSanPham.find(s => s.Ten_Hang === ten || (ma && s.Ghi_Chu === ma));
            
            if (spDB) {
                await fetch(`${window.SB_CONFIG.URL}/rest/v1/Bang_Gia_San_Pham?Id=eq.${spDB.Id}`, { 
                    method: 'PATCH', headers: h, body: JSON.stringify({ Gia_Von: dongia }) 
                });
            }

            // --- PHÂN LUỒNG ĐỘC LẬP TẠI ĐÂY ---
            if (loaiHang.includes("Nguyên liệu")) {
                if (!finalMaHang || !finalMaHang.startsWith("NEW-")) {
                    finalMaHang = "NEW-" + Math.random().toString(36).substr(2, 6).toUpperCase();
                }
                let payloadNL = { 
                    Ma_Nguyen_Lieu: finalMaHang,
                    Ten_Nguyen_Lieu: ten,
                    Ten_Hang: ten,
                    DVT: dvt, 
                    So_Luong: sl, 
                    Ghi_Chu: "Nhập hàng mới",
                    Ngay_Gio: ngayGio,
                    Ma_Don: "CHỜ KIỂM",
                    Khach_Hang: "Hệ thống"
                };
                let postRes = await fetch(`${window.SB_CONFIG.URL}/rest/v1/Nhatky_nguyenlieu`, { method: 'POST', headers: h, body: JSON.stringify(payloadNL) });
                if(!postRes.ok) {
                    let errInfo = await postRes.json();
                    throw new Error("Lỗi ghi bảng Nguyên Liệu: " + (errInfo.message || JSON.stringify(errInfo)));
                }
            } else {
                let isDaCongVaoKho = false;
                let maKhoVatTu = null;
                if (finalMaHang && finalMaHang.startsWith("SMK-")) {
                    maKhoVatTu = finalMaHang;
                } else if (spDB && spDB.Ghi_Chu && spDB.Ghi_Chu.startsWith("SMK-")) {
                    maKhoVatTu = spDB.Ghi_Chu;
                    finalMaHang = maKhoVatTu; 
                }

                if (maKhoVatTu) {
                    let resKhoCheck = await fetch(`${window.SB_CONFIG.URL}/rest/v1/Kho_Vat_Tu?Ma_QR=eq.${maKhoVatTu}`, { headers: h });
                    let khoData = await resKhoCheck.json();
                    if (khoData && khoData.length > 0) {
                        let tonMoi = (parseFloat(khoData[0].So_Luong) || 0) + sl;
                        await fetch(`${window.SB_CONFIG.URL}/rest/v1/Kho_Vat_Tu?id=eq.${khoData[0].id || khoData[0].Id}`, { 
                            method: 'PATCH', headers: h, body: JSON.stringify({ So_Luong: tonMoi }) 
                        });
                        isDaCongVaoKho = true;
                    }
                }

                if (!isDaCongVaoKho && loaiHang.includes("Vật tư")) {
                    let targetMa = (finalMaHang && finalMaHang.startsWith("SMK-")) ? finalMaHang : null;
                    if (targetMa) {
                        let r = await fetch(`${window.SB_CONFIG.URL}/rest/v1/Kho_Vat_Tu?Ma_QR=eq.${targetMa}`, { headers: h });
                        let d = await r.json();
                        if (d && d.length > 0) {
                            await fetch(`${window.SB_CONFIG.URL}/rest/v1/Kho_Vat_Tu?id=eq.${d[0].id || d[0].Id}`, { method: 'PATCH', headers: h, body: JSON.stringify({ So_Luong: (parseFloat(d[0].So_Luong)||0) + sl }) });
                            isDaCongVaoKho = true;
                        } else targetMa = null;
                    }
                    if (!targetMa) {
                        finalMaHang = "SMK-" + Math.random().toString(36).substr(2, 6).toUpperCase();
                        await fetch(`${window.SB_CONFIG.URL}/rest/v1/Kho_Vat_Tu`, { method: 'POST', headers: h, body: JSON.stringify({ Nhom_Hang: nhom, Ten_Hang: ten, Ma_QR: finalMaHang, Quy_Cach: dvt, So_Luong: sl, Ngay_Nhap: ngayGio }) });
                    }
                }
            }

            let payloadNhap = {
                Ten_Hang: ten, Ma_Hang: finalMaHang, Nhom_Hang: nhom, DVT: dvt, 
                So_Luong: sl, Don_Gia: dongia, Thanh_Tien: tien, Nha_Cung_Cap: ncc, Loai_Hang: loaiHang, Ghi_Chu: gc, Thanh_Toan: thanhToan
            };

            if (!isEditingMode) {
                payloadNhap.Ngay_Gio = ngayGio;
            }

            if (isEditingMode && idLog) {
                await fetch(`${window.SB_CONFIG.URL}/rest/v1/${TABLE_NHAP_HANG}?id=eq.${idLog}`, { method: 'PATCH', headers: h, body: JSON.stringify(payloadNhap) });
            } else {
                await fetch(`${window.SB_CONFIG.URL}/rest/v1/${TABLE_NHAP_HANG}`, { method: 'POST', headers: h, body: JSON.stringify(payloadNhap) });
            }

            Swal.fire({ icon: 'success', title: 'Đã lưu sổ sách & kho!', timer: 1500, showConfirmButton: false });
            resetForm();
            loadData();
        } catch (e) { Swal.fire('Lỗi', e.message, 'error'); }
    }

    // ==========================================
    // THAO TÁC BẢNG: LỌC TRỰC TIẾP, SỬA, XÓA
    // ==========================================
    window.viewAllMonths = function() {
        document.getElementById('monthFilter').value = "";
        filterDisplayList();
    }

    window.filterDisplayList = function() {
        const query = document.getElementById("searchFilter").value.toLowerCase().trim();
        const monthVal = document.getElementById("monthFilter").value; 
        const thanhToanVal = document.getElementById("thanhToanFilter").value; 
        
        let filteredData = masterData;

        if (monthVal) {
            const [y, m] = monthVal.split('-');
            const targetStr1 = `${m}/${y}`; 
            const targetStr2 = `${y}-${m}`; 
            const targetStr3 = `${parseInt(m)}/${y}`; 
            
            filteredData = filteredData.filter(item => {
                if (!item.Ngay_Gio) return false;
                return item.Ngay_Gio.includes(targetStr1) || item.Ngay_Gio.includes(targetStr2) || item.Ngay_Gio.includes(targetStr3);
            });
        }

        if (currentNccFilter !== "") {
            filteredData = filteredData.filter(item => (item.Nha_Cung_Cap || "KHÁCH VÃNG LAI").trim() === currentNccFilter);
        }

        if (thanhToanVal !== "") {
            filteredData = filteredData.filter(item => (item.Thanh_Toan || "Đã thanh toán") === thanhToanVal);
        }

        if (query) {
            filteredData = filteredData.filter(item => {
                const ten = (item.Ten_Hang || "").toLowerCase();
                const ma = (item.Ma_Hang || "").toLowerCase();
                const ncc = (item.Nha_Cung_Cap || "").toLowerCase();
                return ten.includes(query) || ma.includes(query) || ncc.includes(query);
            });
        }
        
        const tongTien = filteredData.reduce((acc, curr) => acc + (parseFloat(curr.Thanh_Tien) || 0), 0);
        document.getElementById('tongTienThang').innerText = tongTien.toLocaleString('vi-VN') + " đ";

        renderTable(filteredData);
    }

    function renderTable(data) {
        const container = document.getElementById('data-container');
        container.innerHTML = "";
        
        if(data.length === 0) { 
            container.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:20px; color:#888;">Không có dữ liệu phù hợp.</td></tr>'; 
            return; 
        }

        const rows = data.map(item => {
            let badgeThanhToan = item.Thanh_Toan === "Chưa thanh toán" 
                ? `<span class="badge-unpaid">NỢ</span>` 
                : `<span class="badge-paid">ĐÃ TRẢ</span>`;
            
            let displayDate = formatToVietnameseTime(item.Ngay_Gio);
            let safeItemData = encodeURIComponent(JSON.stringify(item));

            return `
            <tr>
                <td data-label="Ngày Nhập"><small style="color:#7f8c8d; font-weight:bold;">${displayDate}</small></td>
                <td data-label="Mã & Tên">
                    <b style="color:#2c3e50;">${item.Ten_Hang}</b><br>
                    <small style="color:var(--accent); font-weight:bold;">${item.Ma_Hang || ''} | ${item.Nhom_Hang || ''}</small>
                </td>
                <td data-label="Nhà Cung Cấp"><b>${item.Nha_Cung_Cap || 'KHÁCH VÃNG LAI'}</b></td>
                <td data-label="Loại"><span style="background:#e2e8f0; padding:3px 8px; border-radius:4px; font-size:11px;">${item.Loai_Hang ? item.Loai_Hang.split('(')[0] : '-'}</span></td>
                <td data-label="ĐVT/SL" style="text-align:center;"><b>${item.So_Luong}</b> ${item.DVT || ''}</td>
                <td data-label="Đơn giá" style="text-align:right;">${(item.Don_Gia || 0).toLocaleString()}đ</td>
                <td data-label="Thành tiền" style="text-align:right;">
                    <b style="color:#c0392b; display:block; margin-bottom: 2px;">${(item.Thanh_Tien || 0).toLocaleString()}đ</b>
                    ${badgeThanhToan}
                </td>
                <td data-label="Thao tác" style="text-align:center; min-width: 100px;">
                    <button onclick="editRecord('${safeItemData}')" class="btn-edit">SỬA</button> |
                    <button onclick="deleteRecord(${item.id || item.Id})" class="btn-del">XÓA</button>
                </td>
            </tr>`;
        }).join('');

        container.innerHTML = rows;
    }

    window.editRecord = function(encodedItem) {
        const item = JSON.parse(decodeURIComponent(encodedItem));
        isEditingMode = true;
        document.getElementById('f-id').value = item.id || item.Id || "";
        document.getElementById('f-ma').value = item.Ma_Hang || "";
        document.getElementById('f-ten').value = item.Ten_Hang || "";
        document.getElementById('f-nhom').value = item.Nhom_Hang || "";
        document.getElementById('f-dvt').value = item.DVT || "";
        document.getElementById('f-sl').value = item.So_Luong || 1;
        document.getElementById('f-dongia').value = Number(item.Don_Gia || 0).toLocaleString('vi-VN');
        document.getElementById('f-thanhtien').value = Number(item.Thanh_Tien || 0).toLocaleString('vi-VN');
        document.getElementById('f-ncc').value = item.Nha_Cung_Cap || "";
        document.getElementById('f-loaihang').value = item.Loai_Hang || "Khác";
        document.getElementById('f-thanhtoan').value = item.Thanh_Toan || "Đã thanh toán";
        document.getElementById('f-ghichu').value = item.Ghi_Chu || "";
        
        const btn = document.getElementById('btn-save');
        btn.innerHTML = "💾 CẬP NHẬT PHIẾU NHẬP";
        btn.style.background = "#d35400";
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.deleteRecord = async function(id) {
        const r = await Swal.fire({ title: 'Xóa phiếu nhập?', text: 'Dữ liệu sẽ bị xóa và sổ kho/nhật ký cũng sẽ được hoàn trả.', icon: 'warning', showCancelButton: true, confirmButtonColor: '#e74c3c', confirmButtonText: 'XÓA NGAY' });
        if (r.isConfirmed) {
            const h = { 'apikey': window.SB_CONFIG.KEY, 'Authorization': `Bearer ${window.SB_CONFIG.KEY}` };
            
            const oldLog = masterData.find(x => String(x.id || x.Id) === String(id));
            if (oldLog) {
                Swal.fire({ title: 'Đang hoàn trả kho...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                await revertInventory(oldLog);
            }

            await fetch(`${window.SB_CONFIG.URL}/rest/v1/${TABLE_NHAP_HANG}?id=eq.${id}`, { method: 'DELETE', headers: h });
            Swal.fire({ icon: 'success', title: 'Đã xóa & hoàn kho!', timer: 1500, showConfirmButton: false });
            loadData();
        }
    }

    function resetForm() {
        isEditingMode = false;
        document.getElementById('f-id').value = "";
        document.getElementById('f-ma').value = "";
        document.getElementById('f-ten').value = "";
        document.getElementById('f-nhom').value = "";
        document.getElementById('f-dvt').value = "";
        document.getElementById('f-sl').value = "1";
        document.getElementById('f-dongia').value = "0";
        document.getElementById('f-thanhtien').value = "0";
        document.getElementById('f-ncc').value = "";
        document.getElementById('f-thanhtoan').value = "Đã thanh toán";
        document.getElementById('f-ghichu').value = "";
        const btn = document.getElementById('btn-save');
        btn.innerHTML = "📥 XÁC NHẬN NHẬP HÀNG";
        btn.style.background = "var(--accent)";
    }

    window.showFullImage = function(url, title) {
        Swal.fire({ title: title, imageUrl: url, imageWidth: 500, showConfirmButton: false });
    }
  </script>
