<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bảng Giá Sản Phẩm - Sắc Màu</title>
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/config.js"></script>
  <script src="js/auth_guard.js"></script>
  <script src="https://accounts.google.com/gsi/client" onload="initTokenClient()" async defer></script>
  <script src="js/sidebar_loader.js"></script> 
  <style>
    /* ========================================================
       1. GIAO DIỆN CHUNG & PC (GIỮ NGUYÊN 100%)
       ======================================================== */
    :root { --primary: #2D5A27; --bg: #f4f7f6; --border: #e2e8f0; --accent: #d35400; }
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; }
    #sidebar-frame { width: 250px; height: 100vh; position: fixed; left: 0; top: 0; border: none; z-index: 999; transition: 0.3s; }
    .main-content { flex: 1; margin-left: 250px; padding: 25px; transition: 0.3s; min-width: 0; }

    .form-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 5px solid var(--accent); }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
    .input-group { display: flex; flex-direction: column; }
    .input-group label { font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #475569; text-transform: uppercase; }
    .input-modern { padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; font-size: 14px; }
    .input-modern:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(211, 84, 0, 0.1); }

    .inventory-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .group-header { background: #f8fafc; padding: 12px 15px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; border: 1px solid #e2e8f0; border-radius: 8px; margin-top: 10px; transition: 0.2s; }
    .group-header:hover { background: #edf2f7; color: var(--accent); }
    .group-content { display: none; margin-top: 5px; }
    .group-content.show { display: block; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border-bottom: 1px solid #eee; padding: 12px 8px; text-align: left; }
    th { background: #f1f5f9; color: #64748b; font-size: 11px; text-transform: uppercase; }
    
    .img-preview { width: 45px; height: 45px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 1px solid #ddd; transition: 0.2s; }
    .img-preview:hover { transform: scale(1.1); }
    .qr-preview { width: 40px; height: 40px; cursor: pointer; background: white; padding: 2px; border: 1px solid #eee; }
    
    /* Cập nhật class nút bấm */
    .btn-submit { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; flex: 1; }
    .btn-submit:hover { background: #a04000; transform: translateY(-2px); }
    
    .btn-import-kho { background: #2D5A27; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; flex: 1; }
    .btn-import-kho:hover { background: #1e3f1a; transform: translateY(-2px); }
    
    .btn-import-dm { background: #2980b9; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; flex: 1; }
    .btn-import-dm:hover { background: #1f618d; transform: translateY(-2px); }

    .btn-container { display: flex; gap: 15px; margin-top: 20px; width: 100%; flex-wrap: wrap; }

    .swal2-container { z-index: 20000 !important; }

    /* ========================================================
       2. MOBILE RESPONSIVE (ĐIỆN THOẠI)
       ======================================================== */
    @media (max-width: 768px) {
        #sidebar-frame { left: -250px; }
        .main-content { margin-left: 0 !important; padding: 15px; padding-top: 65px; }
        body.sidebar-open #sidebar-frame { left: 0; }
        
        .mobile-nav-btn {
            display: block; position: fixed; top: 10px; left: 10px; 
            z-index: 1000; background: var(--accent); color: white; 
            padding: 8px 12px; border: none; border-radius: 4px;
        }

        .header-top { flex-direction: column; align-items: flex-start !important; gap: 15px; }
        .header-top button { width: 100%; }

        .form-card { padding: 15px; }
        .form-grid { grid-template-columns: 1fr; }
        .input-group { grid-column: span 1 !important; }
        .btn-container { flex-direction: column; gap: 10px; }

        /* Biến bảng thành Card để tra cứu giá dễ dàng */
        .group-content { overflow-x: hidden; }
        table, thead, tbody, th, td, tr { display: block; width: 100%; }
        thead { display: none; }
        
        tr { margin-bottom: 15px; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px; background: #fff; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        td { border: none; padding: 8px 5px 8px 100px; position: relative; min-height: 35px; display: flex; align-items: center; justify-content: flex-start; text-align: left; }
        
        /* Nhãn hiển thị cột */
        td:before { position: absolute; left: 10px; width: 85px; font-weight: bold; color: #64748b; font-size: 11px; text-transform: uppercase; content: attr(data-label); }
        
        .img-preview { width: 60px; height: 60px; }
        .qr-preview { width: 50px; height: 50px; }

        /* SweetAlert Popup Mobile */
        .swal2-popup { width: 95% !important; padding: 10px !important; border-radius: 12px !important; }
        .swal2-html-container div[style*="display: grid"] { grid-template-columns: 1fr !important; gap: 10px !important; }
        .swal2-actions button { width: 100% !important; margin: 5px 0 !important; padding: 12px !important; border-radius: 8px !important; }
    }

    @media (min-width: 769px) { .mobile-nav-btn { display: none; } }
  </style>
</head>
<body>

  <div class="main-content">
    <div class="header-top" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <div>
        <h2 style="margin:0; color: var(--accent);">🏷️ QUẢN LÝ BẢNG GIÁ SẮC MÀU</h2>
        <p style="color: #666; font-size: 14px; margin: 5px 0 0 0;">Cấu trúc chuẩn từ Kho - Đồng bộ mã sản phẩm</p>
      </div>
      <button onclick="getToken()" style="padding:10px 15px; cursor:pointer; font-weight:bold; border-radius:8px; border:1px solid var(--accent); background:white; color:var(--accent); transition: 0.2s;">🔐 KẾT NỐI DRIVE</button>
    </div>

    <div class="form-card">
      <div class="form-grid">
        <div class="input-group">
          <label>Nhóm hàng</label>
          <input type="text" id="f-nhom" class="input-modern" placeholder="Vd: In Bạt, Standee...">
        </div>
        <div class="input-group">
          <label>Tên sản phẩm *</label>
          <input type="text" id="f-ten" class="input-modern" placeholder="Tên chi tiết sản phẩm...">
        </div>
        <div class="input-group">
          <label>Giá lẻ (VNĐ)</label>
          <input type="text" id="f-gia-ban" class="input-modern" value="0" oninput="formatCurrency(this)">
        </div>
        <div class="input-group">
          <label>Giá sỉ / Thợ (VNĐ)</label>
          <input type="text" id="f-gia-si" class="input-modern" value="0" oninput="formatCurrency(this)">
        </div>
        <div class="input-group">
          <label>Đơn vị tính</label>
          <input type="text" id="f-dvt" class="input-modern" placeholder="Vd: m2, Cái, Bộ...">
        </div>
        <div class="input-group">
          <label>Mô tả / Quy cách</label>
          <input type="text" id="f-mota" class="input-modern" placeholder="Ghi chú quy cách...">
        </div>
        <div class="input-group" style="grid-column: span 2;">
          <label>Hình ảnh mẫu (Chọn file)</label>
          <input type="file" id="f-hinh" class="input-modern" accept="image/*">
        </div>
      </div>
      <div class="btn-container">
        <button class="btn-import-kho" onclick="openKhoImportPopup()">📥 TỪ KHO VẬT TƯ</button>
        <button class="btn-import-dm" onclick="openDMImportPopup()">🔄 TỪ DANH MỤC SP</button>
        <button class="btn-submit" onclick="submitPriceItem()">📤 XÁC NHẬN LƯU BẢNG GIÁ</button>
      </div>
    </div>

    <div class="inventory-card">
      <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h3 style="margin:0;">📊 CHI TIẾT ĐƠN GIÁ</h3>
        <button onclick="loadPriceList()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-weight:bold;">🔄 Làm mới bảng</button>
      </div>
      <div id="price-list-container">
        <p style="text-align:center; padding:20px; color:#888;">🔍 Đang tải dữ liệu bảng giá...</p>
      </div>
    </div>
  </div>

  <script>
    // TOÀN BỘ LOGIC JS GỐC GIỮ NGUYÊN 100%
    const CLIENT_ID = "139226878812-nuf4fl5sp2gvofgsgu7krtm89iqqgon6.apps.googleusercontent.com";
    const FOLDER_ID = "1ao2E97b8YdawmGb23c8U_6u7N65hTrVN"; 
    let accessToken = localStorage.getItem('drive_access_token');
    let tokenClient;

    function initTokenClient() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/drive.file',
            callback: (tokenResponse) => {
                accessToken = tokenResponse.access_token;
                localStorage.setItem('drive_access_token', accessToken);
                Swal.fire({ icon: 'success', title: 'Drive đã sẵn sàng!', timer: 1000, showConfirmButton: false });
            },
        });
    }

    function getToken() { tokenClient.requestAccessToken(); }

    function formatCurrency(input) {
      let v = input.value.replace(/\D/g, "");
      input.value = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }
    function parseNum(s) { return Number(s.toString().replace(/\./g, "")) || 0; }

    document.addEventListener("DOMContentLoaded", () => {
      setTimeout(loadPriceList, 600);
    });

    async function uploadFileToDrive(file) {
        if (!accessToken) return null;
        try {
            const metadata = { name: `GIA_${Date.now()}_${file.name}`, parents: [FOLDER_ID] };
            const resInit = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable&supportsAllDrives=true', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(metadata)
            });
            if(resInit.status === 401) { getToken(); return null; }
            const uploadUrl = resInit.headers.get('Location');
            const resUpload = await fetch(uploadUrl, { method: 'PUT', body: file });
            const result = await resUpload.json();
            return result.id ? `https://drive.google.com/file/d/${result.id}/view` : null;
        } catch (err) {
            console.error("Lỗi Drive:", err);
            return null;
        }
    }

    async function submitPriceItem() {
      const ten = document.getElementById('f-ten').value.trim();
      const nhom = document.getElementById('f-nhom').value.trim() || "Chưa phân loại";
      const file = document.getElementById('f-hinh').files[0];

      if(!ten) return Swal.fire('Lỗi', 'Vui lòng nhập tên sản phẩm!', 'warning');
      
      Swal.fire({ title: 'Đang kiểm tra & lưu...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

      try {
        const h = { 'apikey': window.SB_CONFIG.KEY, 'Authorization': `Bearer ${window.SB_CONFIG.KEY}`, 'Content-Type': 'application/json' };
        
        let maQR = "";
        let isDuplicate = true;
        while (isDuplicate) {
            maQR = "SMP-" + Math.random().toString(36).substr(2, 6).toUpperCase();
            const resCheck = await fetch(`${window.SB_CONFIG.URL}/rest/v1/Bang_Gia_San_Pham?Ma_QR=eq.${maQR}&select=Id`, { headers: h });
            const dataCheck = await resCheck.json();
            if (dataCheck.length === 0) isDuplicate = false;
        }

        let driveLink = "";
        if (file) driveLink = await uploadFileToDrive(file);

        await fetch(`${window.SB_CONFIG.URL}/rest/v1/Bang_Gia_San_Pham`, {
          method: 'POST', headers: h, body: JSON.stringify({
            Nhom_Hang: nhom, 
            Ten_Hang: ten, 
            Gia_Ban: parseNum(document.getElementById('f-gia-ban').value),
            Gia_Si: parseNum(document.getElementById('f-gia-si').value),
            Don_Vi_Tinh: document.getElementById('f-dvt').value,
            Mo_Ta: document.getElementById('f-mota').value,
            Hinh_Anh: driveLink,
            Ma_QR: maQR,
            Ghi_Chu: "" 
          })
        });

        Swal.fire('Thành công', `Đã lưu sản phẩm mã: ${maQR}`, 'success');
        document.getElementById('f-ten').value = "";
        document.getElementById('f-hinh').value = "";
        loadPriceList();
      } catch (e) { Swal.fire('Lỗi', e.message, 'error'); }
    }

    async function loadPriceList() {
      const h = { 'apikey': window.SB_CONFIG.KEY, 'Authorization': `Bearer ${window.SB_CONFIG.KEY}` };
      try {
        const res = await fetch(`${window.SB_CONFIG.URL}/rest/v1/Bang_Gia_San_Pham?select=*&order=Nhom_Hang.asc`, { headers: h });
        const data = await res.json();
        
        const groups = {};
        data.forEach(item => {
          if (!groups[item.Nhom_Hang]) groups[item.Nhom_Hang] = [];
          groups[item.Nhom_Hang].push(item);
        });

        const container = document.getElementById('price-list-container');
        container.innerHTML = "";
        if(data.length === 0) { container.innerHTML = '<p style="text-align:center; padding:20px; color:#888;">Bảng giá trống.</p>'; return; }

        for (let nhom in groups) {
          let rows = groups[nhom].map(item => {
            const qrImageUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(item.Ma_QR)}`;
            
            let thumbDisplay = '<span style="color:#ccc">N/A</span>';
            if (item.Hinh_Anh && item.Hinh_Anh.includes('/d/')) {
                const fileId = item.Hinh_Anh.split('/d/')[1]?.split('/')[0];
                const finalThumb = `https://drive.google.com/thumbnail?id=${fileId}&sz=w200`;
                thumbDisplay = `<img src="${finalThumb}" class="img-preview" onclick="window.open('${item.Hinh_Anh}', '_blank')" title="Mở ảnh Drive">`;
            }

            return `
            <tr>
              <td data-label="Mã QR"><img src="${qrImageUrl}" class="qr-preview" onclick="Swal.fire({title: 'QR: ${item.Ma_QR}', imageUrl: '${qrImageUrl}', imageWidth: 250})"></td>
              <td data-label="Ảnh">${thumbDisplay}</td>
              <td data-label="Tên hàng">
                <b>${item.Ten_Hang}</b><br>
                <small style="color:#888">${item.Mo_Ta || ''}</small><br>
                <small style="color:#2D5A27; font-weight:bold;">${item.Ghi_Chu ? '🔗 Liên kết kho: ' + item.Ghi_Chu : ''}</small>
              </td>
              <td data-label="ĐVT">${item.Don_Vi_Tinh || ''}</td>
              <td data-label="Giá lẻ" style="color:red; font-weight:bold;">${(item.Gia_Ban || 0).toLocaleString()}</td>
              <td data-label="Giá sỉ" style="color:green; font-weight:bold;">${(item.Gia_Si || 0).toLocaleString()}</td>
              <td data-label="Thao tác">
                <button onclick='editPrice(${JSON.stringify(item)})' style="color:#2980b9; border:none; background:none; cursor:pointer; font-weight:bold; padding:5px;">SỬA</button> | 
                <button onclick="deletePrice(${item.Id})" style="color:red; border:none; background:none; cursor:pointer; font-weight:bold; padding:5px;">XÓA</button>
              </td>
            </tr>`}).join('');

          container.innerHTML += `
            <div class="group-header" onclick="this.nextElementSibling.classList.toggle('show')">
              <span>➕ ${nhom.toUpperCase()} (${groups[nhom].length} mặt hàng)</span>
              <span>▼</span>
            </div>
            <div class="group-content">
              <table>
                <thead><tr><th>QR</th><th>Ảnh</th><th>Tên hàng</th><th>ĐVT</th><th>Giá lẻ</th><th>Giá sỉ</th><th>Thao tác</th></tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>`;
        }
      } catch (e) { console.error(e); }
    }

    async function editPrice(item) {
      const { value: formValues } = await Swal.fire({
        title: 'CẬP NHẬT BÁO GIÁ',
        width: '750px',
        html: `
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; font-size: 13px; padding: 10px;">
            <div><label><b>Nhóm hàng:</b></label><input id="e-nhom" class="swal2-input" value="${item.Nhom_Hang}" style="width:100%;"></div>
            <div><label><b>Tên hàng:</b></label><input id="e-ten" class="swal2-input" value="${item.Ten_Hang}" style="width:100%;"></div>
            <div><label><b>Giá lẻ:</b></label><input id="e-gia-ban" class="swal2-input" value="${(item.Gia_Ban || 0).toLocaleString().replace(/,/g, '.')}" oninput="formatCurrency(this)" style="width:100%;"></div>
            <div><label><b>Giá sỉ:</b></label><input id="e-gia-si" class="swal2-input" value="${(item.Gia_Si || 0).toLocaleString().replace(/,/g, '.')}" oninput="formatCurrency(this)" style="width:100%;"></div>
            <div><label><b>Đơn vị tính:</b></label><input id="e-dvt" class="swal2-input" value="${item.Don_Vi_Tinh || ''}" style="width:100%;"></div>
            <div><label><b>Mô tả:</b></label><input id="e-mota" class="swal2-input" value="${item.Mo_Ta || ''}" style="width:100%;"></div>
            <div style="grid-column: span 2;">
                <label><b>Thay đổi ảnh mẫu:</b></label>
                <input type="file" id="e-hinh" class="swal2-file" accept="image/*" style="width:100%;">
            </div>
          </div>`,
        showCancelButton: true,
        confirmButtonText: 'LƯU THAY ĐỔI',
        confirmButtonColor: '#d35400',
        cancelButtonText: 'HỦY',
        preConfirm: async () => {
          const newFile = document.getElementById('e-hinh').files[0];
          let newLink = item.Hinh_Anh;
          if (newFile) {
              Swal.showLoading();
              newLink = await uploadFileToDrive(newFile);
          }
          return {
            Nhom_Hang: document.getElementById('e-nhom').value,
            Ten_Hang: document.getElementById('e-ten').value,
            Gia_Ban: parseNum(document.getElementById('e-gia-ban').value),
            Gia_Si: parseNum(document.getElementById('e-gia-si').value),
            Don_Vi_Tinh: document.getElementById('e-dvt').value,
            Mo_Ta: document.getElementById('e-mota').value,
            Hinh_Anh: newLink
          }
        }
      });
      if (formValues) {
        const h = { 'apikey': window.SB_CONFIG.KEY, 'Authorization': `Bearer ${window.SB_CONFIG.KEY}`, 'Content-Type': 'application/json' };
        await fetch(`${window.SB_CONFIG.URL}/rest/v1/Bang_Gia_San_Pham?Id=eq.${item.Id}`, { method: 'PATCH', headers: h, body: JSON.stringify(formValues) });
        loadPriceList();
        Swal.fire({icon: 'success', title: 'Đã cập nhật bảng giá', timer: 1000, showConfirmButton: false});
      }
    }

    async function deletePrice(id) {
      const r = await Swal.fire({ title: 'Xóa báo giá này?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: 'XÓA NGAY' });
      if (r.isConfirmed) {
        const h = { 'apikey': window.SB_CONFIG.KEY, 'Authorization': `Bearer ${window.SB_CONFIG.KEY}` };
        await fetch(`${window.SB_CONFIG.URL}/rest/v1/Bang_Gia_San_Pham?Id=eq.${id}`, { method: 'DELETE', headers: h });
        loadPriceList();
      }
    }

    // =========================================================================
    // TÍNH NĂNG 1: NHẬP GIÁ TỪ KHO VẬT TƯ (Giữ nguyên)
    // =========================================================================
    async function openKhoImportPopup() {
        Swal.fire({ title: 'Đang tải dữ liệu Kho...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        const h = { 'apikey': window.SB_CONFIG.KEY, 'Authorization': `Bearer ${window.SB_CONFIG.KEY}` };

        try {
            const resKho = await fetch(`${window.SB_CONFIG.URL}/rest/v1/Kho_Vat_Tu?select=*`, { headers: h });
            const dataKho = await resKho.json();

            const resGia = await fetch(`${window.SB_CONFIG.URL}/rest/v1/Bang_Gia_San_Pham?select=Ghi_Chu`, { headers: h });
            const dataGia = await resGia.json();
            const maKhoDaCoGia = dataGia.map(item => item.Ghi_Chu).filter(m => m && m.startsWith('SMK-'));

            const vatTuMoi = dataKho.filter(vt => !maKhoDaCoGia.includes(vt.Ma_QR));

            if (vatTuMoi.length === 0) {
                return Swal.fire('Thông báo', 'Tất cả vật tư trong kho đều đã được niêm yết giá.', 'info');
            }

            let rowsHtml = vatTuMoi.map((vt, index) => `
                <tr style="border-bottom: 1px solid #ddd;">
                    <td style="padding: 10px; text-align: left; max-width: 150px;">
                        <b>${vt.Ten_Hang}</b><br>
                        <small style="color: gray;">Mã kho: ${vt.Ma_QR}</small>
                    </td>
                    <td style="padding: 10px; text-align: center;">${vt.Quy_Cach || '-'}</td>
                    <td style="padding: 10px;"><input type="text" id="imp-ban-${index}" class="swal2-input" placeholder="Giá lẻ" style="width: 100%; margin: 0; font-size: 13px;" oninput="formatCurrency(this)"></td>
                    <td style="padding: 10px;"><input type="text" id="imp-si-${index}" class="swal2-input" placeholder="Giá sỉ" style="width: 100%; margin: 0; font-size: 13px;" oninput="formatCurrency(this)"></td>
                </tr>
            `).join('');

            const { value: newDataToInsert, isConfirmed } = await Swal.fire({
                title: 'ĐỒNG BỘ GIÁ TỪ KHO',
                width: '800px',
                html: `
                    <div style="max-height: 400px; overflow-y: auto;">
                        <table style="width: 100%; border-collapse: collapse; font-size: 14px;">
                            <thead style="position: sticky; top: 0; background: #2D5A27; color: white;">
                                <tr>
                                    <th style="padding: 10px; text-align: left;">Tên Vật Tư</th>
                                    <th style="padding: 10px; text-align: center;">ĐVT</th>
                                    <th style="padding: 10px;">Giá Lẻ (Nhập tay)</th>
                                    <th style="padding: 10px;">Giá Sỉ (Nhập tay)</th>
                                </tr>
                            </thead>
                            <tbody>${rowsHtml}</tbody>
                        </table>
                    </div>
                    <p style="color: red; font-size: 12px; margin-top: 10px; text-align: left;">* Lưu ý: Chỉ những dòng có nhập Giá Lẻ hoặc Giá Sỉ mới được lưu vào hệ thống.</p>
                `,
                showCancelButton: true,
                confirmButtonText: 'LƯU TẤT CẢ VÀO BẢNG GIÁ',
                confirmButtonColor: '#d35400',
                cancelButtonText: 'HỦY BỎ',
                preConfirm: () => {
                    const data = [];
                    for (let i = 0; i < vatTuMoi.length; i++) {
                        const elBan = document.getElementById(`imp-ban-${i}`);
                        const elSi = document.getElementById(`imp-si-${i}`);
                        
                        if (!elBan || !elSi) continue;

                        const giaBan = parseNum(elBan.value);
                        const giaSi = parseNum(elSi.value);
                        
                        if (giaBan > 0 || giaSi > 0) {
                            let maQRSanPham = "SMP-" + Math.random().toString(36).substr(2, 6).toUpperCase();
                            data.push({
                                Nhom_Hang: vatTuMoi[i].Nhom_Hang,
                                Ten_Hang: vatTuMoi[i].Ten_Hang,
                                Gia_Ban: giaBan,
                                Gia_Si: giaSi,
                                Don_Vi_Tinh: vatTuMoi[i].Quy_Cach || 'Cái', 
                                Mo_Ta: vatTuMoi[i].Kich_Thuoc ? `KT: ${vatTuMoi[i].Kich_Thuoc}` : '',
                                Hinh_Anh: vatTuMoi[i].Hinh_Anh,
                                Ma_QR: maQRSanPham, 
                                Ghi_Chu: vatTuMoi[i].Ma_QR 
                            });
                        }
                    }
                    return data;
                }
            });

            if (isConfirmed && newDataToInsert) {
                if (newDataToInsert.length > 0) {
                    Swal.fire({ title: 'Đang đẩy dữ liệu lên hệ thống...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                    
                    const postHeaders = { 
                        'apikey': window.SB_CONFIG.KEY, 
                        'Authorization': `Bearer ${window.SB_CONFIG.KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    };

                    const response = await fetch(`${window.SB_CONFIG.URL}/rest/v1/Bang_Gia_San_Pham`, {
                        method: 'POST',
                        headers: postHeaders,
                        body: JSON.stringify(newDataToInsert)
                    });

                    if (!response.ok) {
                        const errInfo = await response.json();
                        throw new Error(errInfo.message || "Cơ sở dữ liệu từ chối gói thông tin!");
                    }

                    Swal.fire('Thành công', `Đã đồng bộ ${newDataToInsert.length} vật tư vào Bảng Giá.`, 'success');
                    loadPriceList();
                } else {
                    Swal.fire('Thông báo', 'Bạn chưa nhập giá cho vật tư nào nên không có gì được lưu.', 'info');
                }
            }

        } catch (error) {
            Swal.fire('Lỗi', error.message, 'error');
        }
    }

    // =========================================================================
    // TÍNH NĂNG 2: CHUẨN HÓA DỮ LIỆU TỪ DANH MỤC SẢN PHẨM (DM_SanPham)
    // =========================================================================
    async function openDMImportPopup() {
        Swal.fire({ title: 'Đang tải Danh mục Sản phẩm...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        const h = { 'apikey': window.SB_CONFIG.KEY, 'Authorization': `Bearer ${window.SB_CONFIG.KEY}` };

        try {
            // Lấy danh sách DM_SanPham
            const resDM = await fetch(`${window.SB_CONFIG.URL}/rest/v1/DM_SanPham?select=*`, { headers: h });
            const dataDM = await resDM.json();

            // Lấy danh sách Bảng Giá hiện tại để đối chiếu (Dựa theo Tên)
            const resGia = await fetch(`${window.SB_CONFIG.URL}/rest/v1/Bang_Gia_San_Pham?select=Ten_Hang`, { headers: h });
            const dataGia = await resGia.json();
            const tenDaCoTrongGia = dataGia.map(item => item.Ten_Hang ? item.Ten_Hang.toLowerCase().trim() : '');

            // Lọc các sản phẩm chưa có trong Bảng Giá
            const spChuaCoGia = dataDM.filter(sp => {
                if(!sp.Ten_Hang) return false;
                return !tenDaCoTrongGia.includes(sp.Ten_Hang.toLowerCase().trim());
            });

            if (spChuaCoGia.length === 0) {
                return Swal.fire('Thông báo', 'Tất cả sản phẩm trong Danh Mục đều đã có trên Bảng Giá chuẩn.', 'info');
            }

            // Tạo giao diện
            let rowsHtml = spChuaCoGia.map((sp, index) => {
                const giaLeStr = Number(sp.Gia_Le || 0).toLocaleString("vi-VN");
                const giaSiStr = Number(sp.Gia_Si || 0).toLocaleString("vi-VN");
                
                return `
                <tr style="border-bottom: 2px solid #eee; background: ${index % 2 === 0 ? '#fff' : '#fcfcfc'}">
                    <td style="padding: 15px 10px; text-align: left; max-width: 200px;">
                        <b style="color: #2980b9;">${sp.Ten_Hang}</b><br>
                        <small style="color: gray;">Gốc: Lẻ ${giaLeStr}đ - Sỉ ${giaSiStr}đ</small><br>
                        <input type="text" id="dm-mota-${index}" class="swal2-input" placeholder="Nhập mô tả (Không bắt buộc)..." style="width: 100%; margin: 5px 0 0 0; font-size: 12px; height: 30px;">
                    </td>
                    <td style="padding: 10px;"><input type="text" id="dm-ban-${index}" class="swal2-input" value="${giaLeStr}" style="width: 100%; margin: 0; font-size: 13px; text-align:right;" oninput="formatCurrency(this)"></td>
                    <td style="padding: 10px;"><input type="text" id="dm-si-${index}" class="swal2-input" value="${giaSiStr}" style="width: 100%; margin: 0; font-size: 13px; text-align:right;" oninput="formatCurrency(this)"></td>
                    <td style="padding: 10px; text-align: center;">
                        <input type="file" id="dm-file-${index}" accept="image/*" style="font-size: 11px; max-width: 120px;">
                        <input type="hidden" id="dm-dvt-${index}" value="${sp.DVT || 'Cái'}">
                        <input type="hidden" id="dm-ten-${index}" value="${sp.Ten_Hang}">
                    </td>
                </tr>
            `}).join('');

            const { value: selectedData, isConfirmed } = await Swal.fire({
                title: 'CHUẨN HÓA TỪ DANH MỤC',
                width: '1000px',
                html: `
                    <div style="max-height: 500px; overflow-y: auto;">
                        <table style="width: 100%; border-collapse: collapse; font-size: 13px;">
                            <thead style="position: sticky; top: 0; background: #2980b9; color: white; z-index: 10;">
                                <tr>
                                    <th style="padding: 12px 10px; text-align: left;">Sản phẩm / Mô tả</th>
                                    <th style="padding: 12px 10px; width: 120px;">Giá Bán mới</th>
                                    <th style="padding: 12px 10px; width: 120px;">Giá Sỉ mới</th>
                                    <th style="padding: 12px 10px; text-align: center; width: 150px;">Tải ảnh Drive</th>
                                </tr>
                            </thead>
                            <tbody>${rowsHtml}</tbody>
                        </table>
                    </div>
                    <p style="color: red; font-size: 12px; margin-top: 10px; text-align: left;">* Lưu ý: Hệ thống sẽ mất khoảng 2-3 giây để tải mỗi bức ảnh lên Google Drive trước khi lưu.</p>
                `,
                showCancelButton: true,
                confirmButtonText: 'LƯU TẤT CẢ LÊN BẢNG GIÁ',
                confirmButtonColor: '#2D5A27',
                cancelButtonText: 'HỦY BỎ',
                preConfirm: () => {
                    const data = [];
                    for (let i = 0; i < spChuaCoGia.length; i++) {
                        const elBan = document.getElementById(`dm-ban-${i}`);
                        const elSi = document.getElementById(`dm-si-${i}`);
                        if (!elBan || !elSi) continue;

                        const giaBan = parseNum(elBan.value);
                        const giaSi = parseNum(elSi.value);
                        const fileInput = document.getElementById(`dm-file-${i}`);
                        
                        // Nếu có nhập giá thì mới lấy (hoặc có sẵn giá từ danh mục)
                        if (giaBan > 0 || giaSi > 0) {
                            data.push({
                                Nhom_Hang: "SẢN PHẨM KHÁC", // DM_SanPham ko có nhóm nên gom vào nhóm chung
                                Ten_Hang: document.getElementById(`dm-ten-${i}`).value,
                                Gia_Ban: giaBan,
                                Gia_Si: giaSi,
                                Don_Vi_Tinh: document.getElementById(`dm-dvt-${i}`).value, 
                                Mo_Ta: document.getElementById(`dm-mota-${i}`).value,
                                fileUpload: fileInput.files.length > 0 ? fileInput.files[0] : null,
                                Ma_QR: "SMP-" + Math.random().toString(36).substr(2, 6).toUpperCase(), 
                                Ghi_Chu: "" 
                            });
                        }
                    }
                    return data;
                }
            });

            // Nếu nhấn Lưu
            if (isConfirmed && selectedData && selectedData.length > 0) {
                // Bước upload ảnh cần async/await nên tách ra ngoài preConfirm
                Swal.fire({ title: 'Đang tải ảnh & lưu dữ liệu...', text: 'Vui lòng không đóng trình duyệt lúc này.', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                
                const finalDataToInsert = [];
                for (let item of selectedData) {
                    let driveLink = "";
                    if (item.fileUpload) {
                        driveLink = await uploadFileToDrive(item.fileUpload) || "";
                    }
                    
                    finalDataToInsert.push({
                        Nhom_Hang: item.Nhom_Hang,
                        Ten_Hang: item.Ten_Hang,
                        Gia_Ban: item.Gia_Ban,
                        Gia_Si: item.Gia_Si,
                        Don_Vi_Tinh: item.Don_Vi_Tinh,
                        Mo_Ta: item.Mo_Ta,
                        Hinh_Anh: driveLink, // Thay file bằng link thực tế
                        Ma_QR: item.Ma_QR,
                        Ghi_Chu: item.Ghi_Chu
                    });
                }

                const postHeaders = { 
                    'apikey': window.SB_CONFIG.KEY, 
                    'Authorization': `Bearer ${window.SB_CONFIG.KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                };

                const response = await fetch(`${window.SB_CONFIG.URL}/rest/v1/Bang_Gia_San_Pham`, {
                    method: 'POST',
                    headers: postHeaders,
                    body: JSON.stringify(finalDataToInsert)
                });

                if (!response.ok) {
                    const errInfo = await response.json();
                    throw new Error(errInfo.message || "Cơ sở dữ liệu từ chối lưu!");
                }

                Swal.fire('Thành công', `Đã chuẩn hóa và đưa ${finalDataToInsert.length} sản phẩm lên Bảng Giá.`, 'success');
                loadPriceList();
            } else if (isConfirmed) {
                Swal.fire('Thông báo', 'Không có sản phẩm nào hợp lệ để lưu.', 'info');
            }

        } catch (error) {
            Swal.fire('Lỗi hệ thống', error.message, 'error');
        }
    }
  </script>
</body>
</html>
