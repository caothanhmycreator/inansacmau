<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bảng Giá - Sắc Màu</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/config.js"></script>
  <script src="js/auth_guard.js"></script>
  <script src="https://accounts.google.com/gsi/client" onload="initTokenClient()" async defer></script>
  <style>
    :root { --primary: #2D5A27; --bg: #f4f7f6; --accent: #d35400; }
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; }
    #sidebar-frame { width: 250px; height: 100vh; position: fixed; left: 0; top: 0; border: none; z-index: 999; }
    .main-content { flex: 1; margin-left: 250px; padding: 25px; }
    .form-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 5px solid var(--accent); }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
    .input-group { display: flex; flex-direction: column; }
    .input-group label { font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #475569; text-transform: uppercase; }
    .input-modern { padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; font-size: 14px; font-weight: bold; }
    .price-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .group-header { background: #f8fafc; padding: 12px 15px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; border: 1px solid #e2e8f0; border-radius: 8px; margin-top: 10px; }
    .group-content { display: none; margin-top: 5px; overflow-x: auto; }
    .group-content.show { display: block; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 900px; }
    th, td { border-bottom: 1px solid #eee; padding: 12px 8px; text-align: left; }
    .img-preview { width: 45px; height: 45px; object-fit: cover; border-radius: 6px; cursor: pointer; }
    .btn-submit { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; font-size: 16px; }
    @media (max-width: 768px) { .main-content { margin-left: 0; } #sidebar-frame { display:none; } }
  </style>
</head>
<body>
  <iframe src="sidebar.html" id="sidebar-frame"></iframe>
  <div class="main-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h2 style="margin:0; color: var(--accent);">🏷️ QUẢN LÝ BẢNG GIÁ</h2>
      <button onclick="getToken()" style="padding:10px 15px; cursor:pointer; font-weight:bold; border-radius:8px; border:1px solid var(--accent); background:white; color:var(--accent);">🔐 KẾT NỐI DRIVE</button>
    </div>
    <div class="form-card">
      <div class="form-grid">
        <div class="input-group"><label>Nhóm hàng</label><input type="text" id="f-nhom" class="input-modern" placeholder="Vd: In Bạt..."></div>
        <div class="input-group"><label>Tên hàng *</label><input type="text" id="f-ten" class="input-modern" placeholder="Tên sản phẩm..."></div>
        <div class="input-group"><label>Đơn vị tính</label><input type="text" id="f-dvt" class="input-modern" placeholder="Vd: m2..."></div>
        <div class="input-group"><label>Giá lẻ (VNĐ)</label><input type="text" id="f-gia-ban" class="input-modern" value="0" oninput="formatCurrency(this)"></div>
        <div class="input-group"><label>Giá sỉ (VNĐ)</label><input type="text" id="f-gia-si" class="input-modern" value="0" oninput="formatCurrency(this)"></div>
        <div class="input-group"><label>Mô tả</label><input type="text" id="f-mota" class="input-modern"></div>
        <div class="input-group" style="grid-column: span 2;"><label>Hình ảnh</label><input type="file" id="f-hinh" class="input-modern"></div>
      </div>
      <button class="btn-submit" onclick="submitPriceItem()">📤 LƯU BÁO GIÁ</button>
    </div>
    <div class="price-card"><div id="price-list"></div></div>
  </div>

  <script>
    const CLIENT_ID = "139226878812-nuf4fl5sp2gvofgsgu7krtm89iqqgon6.apps.googleusercontent.com";
    const FOLDER_ID = "1ao2E97b8YdawmGb23c8U_6u7N65hTrVN";
    let accessToken = localStorage.getItem('drive_access_token');
    let tokenClient;

    function initTokenClient() {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID, scope: 'https://www.googleapis.com/auth/drive.file',
        callback: (res) => { accessToken = res.access_token; localStorage.setItem('drive_access_token', accessToken); }
      });
    }
    function getToken() { tokenClient.requestAccessToken(); }
    function formatCurrency(input) {
      let v = input.value.replace(/\D/g, "");
      input.value = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }
    function parseNum(s) { return Number(s.replace(/\./g, "")) || 0; }

    async function uploadDrive(file) {
      const meta = { name: `GIA_${Date.now()}_${file.name}`, parents: [FOLDER_ID] };
      const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable', {
        method:'POST', headers:{'Authorization':`Bearer ${accessToken}`,'Content-Type':'application/json'}, body:JSON.stringify(meta)
      });
      const loc = res.headers.get('Location');
      const final = await fetch(loc, { method:'PUT', body:file });
      const data = await final.json();
      return `https://drive.google.com/file/d/${data.id}/view`;
    }

    async function submitPriceItem() {
      const ten = document.getElementById('f-ten').value.trim();
      if(!ten) return Swal.fire('Lỗi','Nhập tên hàng','warning');
      Swal.fire({title:'Đang lưu...', didOpen:()=>Swal.showLoading()});
      try {
        const h = { 'apikey': window.SB_CONFIG.KEY, 'Authorization': `Bearer ${window.SB_CONFIG.KEY}`, 'Content-Type': 'application/json' };
        let maQR = ""; let isDup = true;
        while(isDup) {
          maQR = "SMP-" + Math.random().toString(36).substr(2,6).toUpperCase();
          const ck = await fetch(`${window.SB_CONFIG.URL}/rest/v1/Bang_Gia_San_Pham?Ma_QR=eq.${maQR}&select=Id`, {headers:h});
          const d = await ck.json(); if(d.length===0) isDup = false;
        }
        let link = ""; const file = document.getElementById('f-hinh').files[0];
        if(file) link = await uploadDrive(file);
        await fetch(`${window.SB_CONFIG.URL}/rest/v1/Bang_Gia_San_Pham`, {
          method:'POST', headers:h, body:JSON.stringify({
            Nhom_Hang: document.getElementById('f-nhom').value, Ten_Hang: ten,
            Don_Vi_Tinh: document.getElementById('f-dvt').value, Gia_Ban: parseNum(document.getElementById('f-gia-ban').value),
            Gia_Si: parseNum(document.getElementById('f-gia-si').value), Mo_Ta: document.getElementById('f-mota').value,
            Hinh_Anh: link, Ma_QR: maQR
          })
        });
        Swal.fire('Thành công','','success'); loadPriceList();
      } catch(e) { Swal.fire('Lỗi', e.message, 'error'); }
    }

    async function loadPriceList() {
      const h = { 'apikey': window.SB_CONFIG.KEY, 'Authorization': `Bearer ${window.SB_CONFIG.KEY}` };
      const res = await fetch(`${window.SB_CONFIG.URL}/rest/v1/Bang_Gia_San_Pham?select=*&order=Nhom_Hang.asc`, {headers:h});
      const data = await res.json();
      const groups = {}; data.forEach(i => { if(!groups[i.Nhom_Hang]) groups[i.Nhom_Hang]=[]; groups[i.Nhom_Hang].push(i); });
      const cont = document.getElementById('price-list'); cont.innerHTML = "";
      for(let n in groups) {
        let rs = groups[n].map(i => {
          const qr = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${i.Ma_QR}`;
          let img = i.Hinh_Anh ? `<img src="https://drive.google.com/thumbnail?id=${i.Hinh_Anh.split('id=')[1] || i.Hinh_Anh.split('/d/')[1].split('/')[0]}&sz=w200" class="img-preview" onclick="window.open('${i.Hinh_Anh}')">` : '-';
          return `<tr><td><img src="${qr}" style="width:40px" onclick="Swal.fire({imageUrl:'${qr}'})"></td><td>${img}</td><td><b>${i.Ten_Hang}</b></td><td>${i.Don_Vi_Tinh}</td><td style="color:red">${i.Gia_Ban.toLocaleString()}</td><td style="color:green">${i.Gia_Si.toLocaleString()}</td><td><button onclick="deletePrice(${i.Id})" style="color:red;border:none;background:none;cursor:pointer">XÓA</button></td></tr>`;
        }).join('');
        cont.innerHTML += `<div class="group-header" onclick="this.nextElementSibling.classList.toggle('show')"><span>➕ ${n.toUpperCase()}</span><span>▼</span></div><div class="group-content"><table><thead><tr><th>QR</th><th>Ảnh</th><th>Tên hàng</th><th>ĐVT</th><th>Giá lẻ</th><th>Giá sỉ</th><th>Thao tác</th></tr></thead><tbody>${rs}</tbody></table></div>`;
      }
    }
    async function deletePrice(id) {
      if(confirm('Xóa?')) {
        await fetch(`${window.SB_CONFIG.URL}/rest/v1/Bang_Gia_San_Pham?Id=eq.${id}`, { method:'DELETE', headers:{'apikey':window.SB_CONFIG.KEY,'Authorization':`Bearer ${window.SB_CONFIG.KEY}`} });
        loadPriceList();
      }
    }
  </script>
</body>
</html>
