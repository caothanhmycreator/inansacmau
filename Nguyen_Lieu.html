<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Định Mức Nguyên Liệu - Sắc Màu</title>
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/config.js"></script>
  <script src="js/auth_guard.js"></script>
  <script src="js/sidebar_loader.js"></script> 
  <style>
    /* ========================================================
       1. GIAO DIỆN CHUNG & PC
       ======================================================== */
    :root { --primary: #2D5A27; --bg: #f4f7f6; --border: #e2e8f0; --accent: #27ae60; }
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; }
    #sidebar-frame { width: 250px; height: 100vh; position: fixed; left: 0; top: 0; border: none; z-index: 999; transition: 0.3s; }
    .main-content { flex: 1; margin-left: 250px; padding: 25px; transition: 0.3s; min-width: 0; }

    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
    .search-box { width: 100%; max-width: 400px; padding: 12px 15px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; outline: none; transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
    .search-box:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(45, 90, 39, 0.1); }

    .inventory-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .table-wrapper { width: 100%; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 800px; }
    th, td { border-bottom: 1px solid #eee; padding: 12px 10px; text-align: left; }
    th { background: var(--primary); color: white; font-size: 13px; text-transform: uppercase; position: sticky; top: 0; z-index: 10; }
    
    .btn-add { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.3s; box-shadow: 0 4px 6px rgba(39, 174, 96, 0.2); }
    .btn-add:hover { background: #219653; transform: translateY(-2px); }
    
    .btn-edit { color: #3498db; border: none; background: none; cursor: pointer; font-weight: bold; padding: 5px; }
    .btn-huy { color: #f39c12; border: none; background: none; cursor: pointer; font-weight: bold; padding: 5px; }
    .btn-del { color: #e74c3c; border: none; background: none; cursor: pointer; font-weight: bold; padding: 5px; }
    
    .badge { background: #f1f5f9; color: #475569; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; border: 1px solid #cbd5e1; }
    .badge-ton { background: #e0f2fe; color: #0369a1; border-color: #bae6fd; }

    .swal2-container { z-index: 20000 !important; }

    /* ========================================================
       2. MOBILE RESPONSIVE (ĐIỆN THOẠI)
       ======================================================== */
    @media (max-width: 768px) {
        #sidebar-frame { left: -250px; }
        .main-content { margin-left: 0 !important; padding: 15px; padding-top: 65px; }
        body.sidebar-open #sidebar-frame { left: 0; }
        
        .mobile-nav-btn {
            display: block; position: fixed; top: 10px; left: 10px; 
            z-index: 1000; background: var(--primary); color: white; 
            padding: 8px 12px; border: none; border-radius: 4px;
        }

        .header-top { flex-direction: column; align-items: stretch !important; }
        .search-box { max-width: 100%; box-sizing: border-box; }
        .btn-add { width: 100%; }

        table, thead, tbody, th, td, tr { display: block; width: 100%; box-sizing: border-box; }
        thead { display: none; }
        
        tr { margin-bottom: 15px; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px; background: #fff; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        td { border: none; padding: 8px 5px 8px 110px; position: relative; min-height: 35px; display: flex; align-items: center; justify-content: flex-start; text-align: left; word-break: break-word; }
        
        td:before { position: absolute; left: 10px; width: 95px; font-weight: bold; color: #64748b; font-size: 11px; text-transform: uppercase; content: attr(data-label); }
        
        .swal2-popup { width: 95% !important; padding: 10px !important; border-radius: 12px !important; }
        .swal2-html-container div[style*="display: grid"] { grid-template-columns: 1fr !important; gap: 10px !important; }
    }

    @media (min-width: 769px) { .mobile-nav-btn { display: none; } }
  </style>
</head>
<body>

  <div class="main-content">
    <div class="header-top">
      <div>
        <h2 style="margin:0; color: var(--primary);">🧪 QUẢN LÝ NGUYÊN LIỆU</h2>
        <p style="color: #666; font-size: 14px; margin: 5px 0 0 0;">Thiết lập và theo dõi định mức tồn kho vật tư in</p>
      </div>
      <button class="btn-add" onclick="addMaterial()">+ THÊM NGUYÊN LIỆU MỚI</button>
    </div>

    <div class="inventory-card">
      <div style="margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
        <input type="text" id="searchInput" class="search-box" placeholder="🔍 Tìm theo Tên, Mã NL, ĐVT..." onkeyup="filterTable()">
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button onclick="viewHistory('[XUẤT HỦY]')" style="background:#f39c12; border:none; color:white; padding:8px 12px; border-radius:6px; cursor:pointer; font-weight:bold; font-size: 13px;">🗑️ Lịch sử Hủy</button>
            <button onclick="viewHistory('[ĐÃ SỬ DỤNG]')" style="background:#3498db; border:none; color:white; padding:8px 12px; border-radius:6px; cursor:pointer; font-weight:bold; font-size: 13px;">⚙️ Lịch sử Dùng</button>
            <button onclick="loadMaterials()" style="background:none; border:none; color:var(--primary); cursor:pointer; font-weight:bold;">🔄 Làm mới</button>
        </div>
      </div>
      
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th style="width: 15%;">Mã NL</th>
              <th style="width: 25%;">Tên Nguyên Liệu</th>
              <th style="width: 10%;">ĐVT</th>
              <th style="width: 15%; text-align: center;">Tồn Kho</th>
              <th style="width: 15%;">Ghi Chú</th>
              <th style="width: 20%; text-align: center;">Thao tác</th>
            </tr>
          </thead>
          <tbody id="material-body">
            <tr><td colspan="6" style="text-align:center; padding:20px; color:#888;">🔍 Đang tải dữ liệu nguyên liệu...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let materialsData = [];
    window.currentHistoryData = []; 

    document.addEventListener("DOMContentLoaded", () => {
      loadMaterials();
    });

    function getCleanVNTime() {
      const d = new Date();
      const pad = (n) => n.toString().padStart(2, '0');
      return `${pad(d.getDate())}/${pad(d.getMonth() + 1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    async function loadMaterials() {
      const h = { 'apikey': window.SB_CONFIG.KEY, 'Authorization': `Bearer ${window.SB_CONFIG.KEY}` };
      try {
        const res = await fetch(`${window.SB_CONFIG.URL}/rest/v1/Nhatky_nguyenlieu?Ghi_Chu=eq.[TỒN KHO GỐC]&select=*&order=id.desc`, { headers: h });
        materialsData = await res.json();
        renderTable(materialsData);
      } catch (e) { 
          console.error(e); 
          Swal.fire('Lỗi', 'Không thể tải danh mục nguyên liệu!', 'error');
      }
    }

    function renderTable(data) {
      const tbody = document.getElementById('material-body');
      tbody.innerHTML = "";

      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:20px; color:#888;">Chưa có dữ liệu nguyên liệu gốc.</td></tr>';
        return;
      }

      const rows = data.map((item, index) => {
        return `
          <tr>
            <td data-label="Mã NL"><b>${item.Ma_Nguyen_Lieu || '-'}</b></td>
            <td data-label="Tên NL"><b style="color: #2D5A27;">${item.Ten_Nguyen_Lieu || '-'}</b></td>
            <td data-label="ĐVT"><span class="badge">${item.DVT || '-'}</span></td>
            <td data-label="Tồn Kho" style="text-align: center; color: #d35400; font-weight: bold; font-size: 16px;">${item.So_Luong != null ? Number(item.So_Luong).toLocaleString() : '0'}</td>
            <td data-label="Ghi Chú"><span class="badge badge-ton">${item.Ghi_Chu || '-'}</span></td>
            <td data-label="Thao tác" style="text-align: center;">
              <button class="btn-edit" onclick="editMaterial(${index})">SỬA</button> | 
              <button class="btn-huy" onclick="xuatHuyMaterial(${index})">HỦY</button> | 
              <button class="btn-del" onclick="deleteMaterial(${item.id})">XÓA</button>
            </td>
          </tr>
        `;
      }).join('');

      tbody.innerHTML = rows;
    }

    function filterTable() {
      const query = document.getElementById("searchInput").value.toLowerCase();
      const filtered = materialsData.filter(item => {
        const ma = (item.Ma_Nguyen_Lieu || "").toLowerCase();
        const ten = (item.Ten_Nguyen_Lieu || "").toLowerCase();
        const dvt = (item.DVT || "").toLowerCase();
        return ma.includes(query) || ten.includes(query) || dvt.includes(query);
      });
      renderTable(filtered);
    }

    async function editMaterial(index) {
      const query = document.getElementById("searchInput").value.toLowerCase();
      let currentList = materialsData;
      if(query) {
          currentList = materialsData.filter(item => {
            const ma = (item.Ma_Nguyen_Lieu || "").toLowerCase();
            const ten = (item.Ten_Nguyen_Lieu || "").toLowerCase();
            const dvt = (item.DVT || "").toLowerCase();
            return ma.includes(query) || ten.includes(query) || dvt.includes(query);
          });
      }
      
      const item = currentList[index];

      const { value: formValues } = await Swal.fire({
        title: 'CẬP NHẬT NGUYÊN LIỆU',
        width: '600px',
        html: `
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; font-size: 13px; padding: 10px;">
            <div style="grid-column: span 2;">
                <label><b>Tên Nguyên Liệu *:</b></label>
                <input id="e-ten" class="swal2-input" value="${item.Ten_Nguyen_Lieu || ''}" style="width:100%; margin-top: 5px;">
            </div>
            <div>
                <label><b>Đơn Vị Tính (ĐVT):</b></label>
                <input id="e-dvt" class="swal2-input" value="${item.DVT || ''}" style="width:100%; margin-top: 5px;">
            </div>
            <div>
                <label><b>Số Lượng (Tồn Kho):</b></label>
                <input id="e-sl" type="number" class="swal2-input" value="${item.So_Luong || '0'}" style="width:100%; margin-top: 5px;">
            </div>
          </div>
        `,
        showCancelButton: true,
        confirmButtonText: 'LƯU THAY ĐỔI',
        confirmButtonColor: '#2D5A27',
        cancelButtonText: 'HỦY',
        preConfirm: () => {
          const ten = document.getElementById('e-ten').value.trim();
          if (!ten) { Swal.showValidationMessage('Vui lòng nhập tên nguyên liệu!'); return false; }
          return {
            Ten_Nguyen_Lieu: ten,
            DVT: document.getElementById('e-dvt').value.trim(),
            So_Luong: Number(document.getElementById('e-sl').value) || 0
          }
        }
      });

      if (formValues) {
        Swal.fire({ title: 'Đang lưu...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        try {
          const h = { 'apikey': window.SB_CONFIG.KEY, 'Authorization': `Bearer ${window.SB_CONFIG.KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };
          
          const response = await fetch(`${window.SB_CONFIG.URL}/rest/v1/Nhatky_nguyenlieu?id=eq.${item.id}`, {
            method: 'PATCH',
            headers: h,
            body: JSON.stringify(formValues)
          });
          
          if (!response.ok) {
              const err = await response.json();
              throw new Error(err.message || "Cơ sở dữ liệu từ chối cập nhật!");
          }

          Swal.fire({icon: 'success', title: 'Đã cập nhật!', timer: 1000, showConfirmButton: false});
          loadMaterials(); 
        } catch (e) {
          Swal.fire('Lỗi cập nhật', e.message, 'error');
        }
      }
    }

    async function addMaterial() {
      const { value: formValues } = await Swal.fire({
        title: 'THÊM NGUYÊN LIỆU GỐC',
        width: '600px',
        html: `
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; font-size: 13px; padding: 10px;">
            <div style="grid-column: span 2;">
                <label><b>Tên Nguyên Liệu *:</b></label>
                <input id="a-ten" class="swal2-input" placeholder="Vd: Mực in, Bạt, Giấy..." style="width:100%; margin-top: 5px;">
            </div>
            <div>
                <label><b>Đơn Vị Tính (ĐVT):</b></label>
                <input id="a-dvt" class="swal2-input" placeholder="Vd: Lít, Cuộn, Tờ..." style="width:100%; margin-top: 5px;">
            </div>
            <div>
                <label><b>Số Lượng (Tồn Kho Ban Đầu):</b></label>
                <input id="a-sl" type="number" class="swal2-input" value="0" style="width:100%; margin-top: 5px;">
            </div>
          </div>
          <p style="color: #d35400; font-size: 12px; margin-top: 10px; text-align: left;">* Mã NL sẽ được hệ thống tạo tự động. Ghi chú sẽ được gán tự động là [TỒN KHO GỐC].</p>
        `,
        showCancelButton: true,
        confirmButtonText: 'TẠO MỚI',
        confirmButtonColor: '#27ae60',
        cancelButtonText: 'HỦY',
        preConfirm: async () => {
          const ten = document.getElementById('a-ten').value.trim();
          if (!ten) {
              Swal.showValidationMessage('Vui lòng nhập tên nguyên liệu!');
              return false;
          }
          
          let maMoi = "";
          let isDuplicate = true;
          while(isDuplicate) {
              maMoi = "NL-" + Math.random().toString(36).substr(2, 6).toUpperCase();
              try {
                  const resCheck = await fetch(`${window.SB_CONFIG.URL}/rest/v1/Nhatky_nguyenlieu?Ma_Nguyen_Lieu=eq.${maMoi}&select=id`, {
                      headers: { 'apikey': window.SB_CONFIG.KEY, 'Authorization': `Bearer ${window.SB_CONFIG.KEY}` }
                  });
                  const checkData = await resCheck.json();
                  if(checkData.length === 0) isDuplicate = false; 
              } catch(e) {
                  isDuplicate = false; 
              }
          }

          return {
            id: Math.floor(Date.now() / 1000) + Math.floor(Math.random() * 10000), 
            Ngay_Gio: getCleanVNTime(),
            Ma_Don: "NHẬP KHO",        
            Khach_Hang: "Hệ thống",    
            Ten_Hang: "Tồn kho gốc",   
            Ma_Nguyen_Lieu: maMoi,
            Ten_Nguyen_Lieu: ten,
            DVT: document.getElementById('a-dvt').value.trim(),
            So_Luong: Number(document.getElementById('a-sl').value) || 0,
            Ghi_Chu: "[TỒN KHO GỐC]"
          }
        }
      });

      if (formValues) {
        Swal.fire({ title: 'Đang tạo...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        try {
          const h = { 'apikey': window.SB_CONFIG.KEY, 'Authorization': `Bearer ${window.SB_CONFIG.KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };
          
          const response = await fetch(`${window.SB_CONFIG.URL}/rest/v1/Nhatky_nguyenlieu`, {
            method: 'POST',
            headers: h,
            body: JSON.stringify(formValues)
          });

          if (!response.ok) {
              const err = await response.json();
              throw new Error(err.message || "Cơ sở dữ liệu từ chối lưu bản ghi này!");
          }
          
          Swal.fire({icon: 'success', title: 'Đã thêm nguyên liệu!', timer: 1000, showConfirmButton: false});
          loadMaterials(); 
        } catch (e) {
          Swal.fire('Lỗi tạo mới', e.message, 'error');
        }
      }
    }

    async function xuatHuyMaterial(index) {
      const query = document.getElementById("searchInput").value.toLowerCase();
      let currentList = materialsData;
      if(query) {
          currentList = materialsData.filter(item => {
            const ma = (item.Ma_Nguyen_Lieu || "").toLowerCase();
            const ten = (item.Ten_Nguyen_Lieu || "").toLowerCase();
            const dvt = (item.DVT || "").toLowerCase();
            return ma.includes(query) || ten.includes(query) || dvt.includes(query);
          });
      }
      
      const item = currentList[index];

      const { value: slHuy } = await Swal.fire({
        title: 'XUẤT HỦY NGUYÊN LIỆU',
        html: `Nhập số lượng <b>${item.Ten_Nguyen_Lieu}</b> cần xuất hủy (Tồn hiện tại: <b style="color:red">${item.So_Luong}</b>):`,
        input: 'number',
        inputAttributes: {
          min: 1,
          max: item.So_Luong,
          step: 'any'
        },
        showCancelButton: true,
        confirmButtonText: 'XÁC NHẬN HỦY',
        confirmButtonColor: '#f39c12',
        cancelButtonText: 'ĐÓNG',
        inputValidator: (value) => {
          if (!value || value <= 0) {
            return 'Số lượng xuất hủy phải lớn hơn 0!';
          }
          if (Number(value) > Number(item.So_Luong)) {
            return 'Không thể xuất hủy vượt quá số lượng tồn kho!';
          }
        }
      });

      if (slHuy) {
        Swal.fire({ title: 'Đang xử lý xuất hủy...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        try {
          const h = { 'apikey': window.SB_CONFIG.KEY, 'Authorization': `Bearer ${window.SB_CONFIG.KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };
          
          const tonMoi = Number(item.So_Luong) - Number(slHuy);
          
          const patchRes = await fetch(`${window.SB_CONFIG.URL}/rest/v1/Nhatky_nguyenlieu?id=eq.${item.id}`, {
            method: 'PATCH',
            headers: h,
            body: JSON.stringify({ So_Luong: tonMoi })
          });
          
          if (!patchRes.ok) {
              const err = await patchRes.json();
              throw new Error(err.message || "Cơ sở dữ liệu từ chối trừ tồn kho gốc!");
          }

          let maHuyMoi = "HUY" + (item.Ma_Nguyen_Lieu ? item.Ma_Nguyen_Lieu.substring(2) : "-" + Math.random().toString(36).substr(2, 6).toUpperCase());
          
          const logData = {
            id: Math.floor(Date.now() / 1000) + Math.floor(Math.random() * 10000), 
            Ngay_Gio: getCleanVNTime(),
            Ma_Don: "XUẤT HỦY",        
            Khach_Hang: "Hệ thống",    
            Ten_Hang: "Xuất hủy nguyên liệu",   
            Ma_Nguyen_Lieu: maHuyMoi,
            Ten_Nguyen_Lieu: item.Ten_Nguyen_Lieu,
            DVT: item.DVT,
            So_Luong: Number(slHuy),
            Ghi_Chu: "[XUẤT HỦY]"
          };

          const postRes = await fetch(`${window.SB_CONFIG.URL}/rest/v1/Nhatky_nguyenlieu`, {
            method: 'POST',
            headers: h,
            body: JSON.stringify(logData)
          });

          if (!postRes.ok) {
              const err = await postRes.json();
              throw new Error(err.message || "Cơ sở dữ liệu từ chối lưu nhật ký hủy!");
          }

          Swal.fire({icon: 'success', title: 'Đã ghi nhận xuất hủy!', timer: 1200, showConfirmButton: false});
          loadMaterials(); 
        } catch (e) {
          Swal.fire('Lỗi xử lý', e.message, 'error');
        }
      }
    }

    async function deleteMaterial(id) {
      const r = await Swal.fire({ 
          title: 'Xóa nguyên liệu này?', 
          text: 'Thao tác này sẽ xóa vĩnh viễn bản ghi nguyên liệu này!',
          icon: 'warning', 
          showCancelButton: true, 
          confirmButtonColor: '#e74c3c', 
          confirmButtonText: 'XÓA NGAY' 
      });
      
      if (r.isConfirmed) {
        Swal.fire({ title: 'Đang xóa...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        try {
            const h = { 'apikey': window.SB_CONFIG.KEY, 'Authorization': `Bearer ${window.SB_CONFIG.KEY}` };
            const response = await fetch(`${window.SB_CONFIG.URL}/rest/v1/Nhatky_nguyenlieu?id=eq.${id}`, { 
                method: 'DELETE', 
                headers: h 
            });

            if (!response.ok) {
              const err = await response.json();
              throw new Error(err.message || "Xóa thất bại!");
            }

            Swal.fire({icon: 'success', title: 'Đã xóa!', timer: 1000, showConfirmButton: false});
            loadMaterials();
        } catch (e) {
            Swal.fire('Lỗi xóa dữ liệu', e.message, 'error');
        }
      }
    }

    // =========================================================================
    // XỬ LÝ NÚT XEM LỊCH SỬ XUẤT HỦY / SỬ DỤNG
    // =========================================================================
    window.viewHistory = async function(type) {
        Swal.fire({ title: 'Đang tải dữ liệu...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        try {
            const h = { 'apikey': window.SB_CONFIG.KEY, 'Authorization': `Bearer ${window.SB_CONFIG.KEY}` };
            const res = await fetch(`${window.SB_CONFIG.URL}/rest/v1/Nhatky_nguyenlieu?Ghi_Chu=eq.${type}&select=*&order=id.desc`, { headers: h });
            const data = await res.json();

            window.currentHistoryData = data; 
            window.currentHistoryType = type; // Lưu lại loại lịch sử đang xem

            let title = type === '[XUẤT HỦY]' ? 'LỊCH SỬ XUẤT HỦY' : 'LỊCH SỬ SỬ DỤNG';

            let html = `
                <div style="display: flex; gap: 10px; margin-bottom: 15px; align-items: center; font-size: 13px;">
                    <span>Từ:</span> <input type="date" id="hist-start" class="swal2-input" style="margin:0; height: 35px; font-size: 13px;">
                    <span>Đến:</span> <input type="date" id="hist-end" class="swal2-input" style="margin:0; height: 35px; font-size: 13px;">
                    <button onclick="filterHistory()" style="background:#2D5A27; color:white; border:none; padding:8px 15px; border-radius:6px; cursor:pointer; font-weight:bold;">LỌC</button>
                </div>
                <div style="max-height: 400px; overflow-y: auto; text-align: left;">
                    <table style="width: 100%; border-collapse: collapse; font-size: 13px;">
                        <thead style="position: sticky; top: 0; background: #f1f5f9; z-index: 10;">
                            <tr>
                                <th style="padding: 8px; border-bottom: 1px solid #ddd; width: 15%;">Ngày giờ</th>
                                <th style="padding: 8px; border-bottom: 1px solid #ddd; width: 18%;">Mã NL</th>
                                <th style="padding: 8px; border-bottom: 1px solid #ddd; width: auto;">Tên NL</th>
                                <th style="padding: 8px; border-bottom: 1px solid #ddd; text-align: center; width: 10%;">SL</th>
                                <th style="padding: 8px; border-bottom: 1px solid #ddd; text-align: center; width: 15%;">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="history-body">
                            ${renderHistoryRows(data)}
                        </tbody>
                    </table>
                    <p style="color: #27ae60; font-size: 11px; margin-top: 10px; font-style: italic;">* Lưu ý: Việc Sửa/Xóa lịch sử ở đây sẽ TỰ ĐỘNG hoàn/trừ lại số lượng tương ứng vào Tồn Kho gốc.</p>
                </div>
            `;

            Swal.fire({
                title: title,
                width: '900px', 
                html: html,
                showCloseButton: true,
                showConfirmButton: false
            });

        } catch (error) {
            Swal.fire('Lỗi', 'Không thể tải dữ liệu lịch sử!', 'error');
        }
    };

    window.renderHistoryRows = function(data) {
        if (!data || data.length === 0) return `<tr><td colspan="5" style="text-align:center; padding: 20px;">Không có dữ liệu.</td></tr>`;
        return data.map((item, idx) => `
            <tr id="hist-row-${item.id}">
                <td style="padding: 8px; border-bottom: 1px solid #eee; white-space: nowrap;">${item.Ngay_Gio ? item.Ngay_Gio.split(' ')[0] : ''}</td>
                <td style="padding: 8px; border-bottom: 1px solid #eee; font-size: 12px;"><b>${item.Ma_Nguyen_Lieu || ''}</b></td>
                <td style="padding: 8px; border-bottom: 1px solid #eee; line-height: 1.4;">${item.Ten_Nguyen_Lieu || ''}</td>
                <td style="padding: 8px; border-bottom: 1px solid #eee; text-align: center; color: red; font-weight: bold;">${item.So_Luong || 0}</td>
                <td style="padding: 8px; border-bottom: 1px solid #eee; text-align: center; white-space: nowrap;">
                    <button onclick="editHistoryItem(${item.id}, '${item.Ten_Nguyen_Lieu}', ${item.So_Luong}, '${item.Ma_Nguyen_Lieu}')" style="background: none; border: none; color: #3498db; cursor: pointer; font-weight: bold; padding: 2px;">Sửa</button> |
                    <button onclick="deleteHistoryItem(${item.id}, '${item.Ma_Nguyen_Lieu}', ${item.So_Luong})" style="background: none; border: none; color: #e74c3c; cursor: pointer; font-weight: bold; padding: 2px;">Xóa</button>
                </td>
            </tr>
        `).join('');
    };

    window.filterHistory = function() {
        let start = document.getElementById('hist-start').value;
        let end = document.getElementById('hist-end').value;
        
        let filtered = window.currentHistoryData;

        if (start || end) {
            filtered = window.currentHistoryData.filter(item => {
                if (!item.Ngay_Gio) return false;
                
                let parts = item.Ngay_Gio.split(' ')[0].split('/'); 
                if (parts.length !== 3) return false;
                
                let itemDate = new Date(parts[2], parts[1] - 1, parts[0]);
                itemDate.setHours(0,0,0,0);

                let pass = true;
                if (start) {
                    let sDate = new Date(start);
                    sDate.setHours(0,0,0,0);
                    if (itemDate < sDate) pass = false;
                }
                if (end) {
                    let eDate = new Date(end);
                    eDate.setHours(0,0,0,0);
                    if (itemDate > eDate) pass = false;
                }
                return pass;
            });
        }

        document.getElementById('history-body').innerHTML = renderHistoryRows(filtered);
    };

    window.editHistoryItem = async function(id, tenNL, slCu, maNL) {
        const result = await Swal.fire({
            title: 'SỬA SỐ LƯỢNG LỊCH SỬ',
            html: `Nhập số lượng thực tế mới cho:<br><b style="color:#2980b9">${tenNL}</b>`,
            input: 'number',
            inputValue: slCu,
            showCancelButton: true,
            confirmButtonText: 'LƯU SỬA',
            cancelButtonText: 'ĐÓNG',
            inputValidator: (value) => {
                if (!value || value <= 0) return 'Số lượng phải lớn hơn 0!';
            }
        });

        if (result.isConfirmed && result.value && result.value != slCu) {
            try {
                const h = { 'apikey': window.SB_CONFIG.KEY, 'Authorization': `Bearer ${window.SB_CONFIG.KEY}`, 'Content-Type': 'application/json' };
                let slMoi = Number(result.value);
                let delta = slMoi - slCu;
                
                // 1. Cập nhật tồn kho gốc
                let maGoc = maNL.replace('SD-', 'NL-').replace('HUY-', 'NL-');
                const resGoc = await fetch(`${window.SB_CONFIG.URL}/rest/v1/Nhatky_nguyenlieu?Ma_Nguyen_Lieu=eq.${maGoc}&select=id,So_Luong`, { headers: h });
                const dataGoc = await resGoc.json();
                
                if(dataGoc && dataGoc.length > 0) {
                    let tonMoi = Number(dataGoc[0].So_Luong) - delta;
                    await fetch(`${window.SB_CONFIG.URL}/rest/v1/Nhatky_nguyenlieu?id=eq.${dataGoc[0].id}`, {
                        method: 'PATCH', headers: h, body: JSON.stringify({ So_Luong: tonMoi })
                    });
                }

                // 2. Cập nhật lịch sử
                const res = await fetch(`${window.SB_CONFIG.URL}/rest/v1/Nhatky_nguyenlieu?id=eq.${id}`, {
                    method: 'PATCH', headers: h, body: JSON.stringify({ So_Luong: slMoi })
                });
                
                if (!res.ok) throw new Error("Database từ chối cập nhật!");

                Swal.fire({icon: 'success', title: 'Đã sửa lịch sử & Cập nhật kho!', timer: 1500, showConfirmButton: false}).then(() => {
                    viewHistory(window.currentHistoryType); 
                    loadMaterials(); // Cập nhật bảng ngoài
                });
            } catch (e) {
                Swal.fire('Lỗi', e.message, 'error');
            }
        } else if (result.isDismissed) {
            viewHistory(window.currentHistoryType); 
        }
    };

    window.deleteHistoryItem = async function(id, maNL, slCu) {
        const r = await Swal.fire({ 
            title: 'Xóa dòng lịch sử này?', 
            icon: 'warning', showCancelButton: true, confirmButtonColor: '#e74c3c', confirmButtonText: 'XÓA NGAY', cancelButtonText: 'ĐÓNG'
        });
        
        if (r.isConfirmed) {
            try {
                const h = { 'apikey': window.SB_CONFIG.KEY, 'Authorization': `Bearer ${window.SB_CONFIG.KEY}`, 'Content-Type': 'application/json' };
                
                // 1. Hoàn lại tồn kho gốc
                let maGoc = maNL.replace('SD-', 'NL-').replace('HUY-', 'NL-');
                const resGoc = await fetch(`${window.SB_CONFIG.URL}/rest/v1/Nhatky_nguyenlieu?Ma_Nguyen_Lieu=eq.${maGoc}&select=id,So_Luong`, { headers: h });
                const dataGoc = await resGoc.json();
                
                if(dataGoc && dataGoc.length > 0) {
                    let tonMoi = Number(dataGoc[0].So_Luong) + Number(slCu);
                    await fetch(`${window.SB_CONFIG.URL}/rest/v1/Nhatky_nguyenlieu?id=eq.${dataGoc[0].id}`, {
                        method: 'PATCH', headers: h, body: JSON.stringify({ So_Luong: tonMoi })
                    });
                }

                // 2. Xóa dòng lịch sử
                const res = await fetch(`${window.SB_CONFIG.URL}/rest/v1/Nhatky_nguyenlieu?id=eq.${id}`, { method: 'DELETE', headers: { 'apikey': window.SB_CONFIG.KEY, 'Authorization': `Bearer ${window.SB_CONFIG.KEY}` } });
                if (!res.ok) throw new Error("Database từ chối xóa!");

                Swal.fire({icon: 'success', title: 'Đã xóa & Hoàn số lượng kho!', timer: 1500, showConfirmButton: false}).then(() => {
                    viewHistory(window.currentHistoryType); 
                    loadMaterials(); 
                });

            } catch (e) {
                Swal.fire('Lỗi', e.message, 'error');
            }
        } else if (r.isDismissed) {
            viewHistory(window.currentHistoryType); 
        }
    };
  </script>
</body>
